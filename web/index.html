<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F47B54">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KidPlan">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <title>KidPlan</title>
  <style>
    :root {
      /* Palette C - Buttercream + warm coral. Stripes brightened to harmonize on cream. */
      --tag-indoor: #79B0CF;
      --tag-outdoor: #86C97E;
      --tag-day-trip: #F2BE57;
      --tag-mountains: #4E8A63;
      --tag-playdate: #F0A189;
      --tag-chill: #B8A6D9;
      --tag-errands: #C7B39E;

      --bg: #FFFBF2;
      --surface: #FFFFFF;
      --surface-warm: #FBF3E4;
      --ink: #2E2A26;
      --ink-soft: #786E64;
      --ink-faint: #B8AFA4;
      --accent: #F47B54;
      --accent-soft: #FBDBCC;
      --good: #6FA378;
      --warn: #F47B54;

      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;

      /* Warmer shadow tint to match the cream paper. */
      --shadow-sm: 0 1px 2px rgba(60, 44, 30, 0.05), 0 1px 3px rgba(60, 44, 30, 0.04);
      --shadow: 0 2px 6px rgba(60, 44, 30, 0.06), 0 4px 12px rgba(60, 44, 30, 0.05);
      --shadow-lg: 0 8px 24px rgba(60, 44, 30, 0.10);

      --nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);

      --font-display: 'Fraunces', ui-rounded, "SF Pro Rounded", system-ui, -apple-system, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 16px;
      line-height: 1.45;
      overscroll-behavior-y: none;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
    }
    button {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    a { color: var(--accent); text-decoration: none; }

    /* ---------- Layout ---------- */
    #root {
      max-width: 480px;
      margin: 0 auto;
      padding-top: calc(var(--safe-top) + 8px);
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 24px);
      min-height: 100dvh;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 4px;
    }
    .app-header .brand {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .app-header .brand .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 7px;
      vertical-align: middle;
      transform: translateY(-2px);
    }
    .app-header .header-actions { display: flex; gap: 10px; align-items: center; color: var(--ink-soft); }
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ink-soft);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }
    .icon-btn:active { transform: scale(0.96); }

    .view { padding: 12px 20px 24px; }
    .view-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 26px;
      letter-spacing: -0.01em;
      margin: 8px 0 4px;
    }
    .view-sub {
      color: var(--ink-soft);
      font-size: 14px;
      margin-bottom: 16px;
    }

    /* ---------- Today view ---------- */
    .today-hero {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 22px 22px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .today-hero::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: var(--primary-tag-color, var(--accent));
    }
    .today-date-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .today-date {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 24px;
      letter-spacing: -0.01em;
      line-height: 1.15;
    }
    .today-weather {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--ink-soft);
      background: var(--surface-warm);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .day-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 14px;
      color: var(--ink-soft);
      font-size: 13px;
    }
    .day-nav button {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ink-soft);
    }
    .day-nav button:hover { background: var(--surface-warm); }
    .day-nav .today-link {
      margin-left: auto;
      color: var(--accent);
      font-weight: 500;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .day-note {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink-soft);
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface-warm);
      color: var(--ink-soft);
      border: 1px solid transparent;
    }
    .tag-chip.primary {
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--chip-color, var(--accent));
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .tag-chip .swatch {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--chip-color, var(--accent));
    }
    .tag-chip.outlined {
      background: transparent;
      border-color: var(--ink-faint);
      color: var(--ink-soft);
    }

    .plan-section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .plan-section h3 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 17px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .plan-section h3 .label-pill {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 3px 9px;
      border-radius: 999px;
    }
    .plan-section h3 .label-pill.b {
      background: #E6E0F0;
      color: #6F5BAA;
    }

    .kid-group { margin-top: 10px; }
    .kid-group:first-of-type { margin-top: 0; }
    .kid-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 8px 0 6px;
    }
    .plan-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--surface-warm);
    }
    .plan-item:last-child { border-bottom: none; }
    .plan-item .time {
      font-variant-numeric: tabular-nums;
      font-size: 13px;
      color: var(--ink-soft);
      min-width: 60px;
      padding-top: 1px;
    }
    .plan-item .body { flex: 1; }
    .plan-item .title { font-weight: 500; font-size: 15px; color: var(--ink); }
    .plan-item .location { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

    .plan-b-content {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 6px 0 2px;
    }
    .plan-b-content .body { flex: 1; }
    .plan-b-content .body .name { font-weight: 500; }
    .plan-b-content .body .desc { color: var(--ink-soft); font-size: 13px; margin-top: 3px; }
    .plan-b-content .chevron { color: var(--ink-faint); padding-top: 2px; }

    .cta-row { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      padding: 15px 20px;
      border-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(244, 123, 84, 0.28);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:active { transform: translateY(1px); }
    .btn-secondary {
      width: 100%;
      background: var(--surface);
      color: var(--ink);
      font-weight: 500;
      font-size: 14px;
      padding: 12px 18px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ---------- Week view ---------- */
    .week-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .week-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 19px;
      letter-spacing: -0.01em;
    }
    .week-nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-soft);
    }
    .week-sub {
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .week-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .day-row {
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      min-height: 72px;
      text-align: left;
      width: 100%;
    }
    .day-row .stripe {
      width: 6px;
      background: var(--row-color, var(--ink-faint));
      flex-shrink: 0;
    }
    .day-row .day-content {
      flex: 1;
      padding: 12px 14px 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .day-row .date-block {
      flex-shrink: 0;
      width: 48px;
      text-align: center;
    }
    .day-row .dow {
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .day-row .dom {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 22px;
      line-height: 1.05;
      color: var(--ink);
    }
    .day-row .summary {
      flex: 1;
      min-width: 0;
    }
    .day-row .summary .primary-line {
      font-size: 14px;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .day-row .summary .tag-line {
      font-size: 11px;
      color: var(--ink-soft);
      margin-top: 2px;
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }
    .day-row .icons {
      display: flex;
      gap: 6px;
      color: var(--ink-faint);
      flex-shrink: 0;
    }
    .day-row.today { box-shadow: 0 0 0 2px var(--accent-soft), var(--shadow-sm); }

    /* ---------- Library view ---------- */
    .filter-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 12px;
      margin: 0 -4px 6px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface);
      color: var(--ink-soft);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .filter-chip .swatch {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--chip-color, var(--ink-faint));
    }
    .filter-chip.active {
      background: var(--ink);
      color: #fff;
    }
    .filter-chip.active .swatch { box-shadow: 0 0 0 2px var(--ink); }

    .library-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .library-section-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 18px 0 4px;
    }
    .library-section-head:first-child { margin-top: 4px; }
    .library-section-head .title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 16px;
      color: var(--ink);
    }
    .library-section-head .count {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 2px 9px;
    }
    .library-section-head .hint {
      font-size: 12px;
      color: var(--ink-faint);
      margin-left: auto;
    }
    .library-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }
    .library-card .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .library-card .name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .library-card .swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--chip-color, var(--ink-faint));
    }
    .library-card .meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--ink-soft);
    }
    .library-card .desc {
      margin-top: 6px;
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.4;
    }
    .age-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface-warm);
      color: var(--ink-soft);
      font-weight: 500;
    }

    .fab {
      position: fixed;
      right: 50%;
      transform: translateX(min(220px, 45vw));
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 18px);
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(244, 123, 84, 0.40);
      z-index: 15;
    }
    .fab:active { transform: translateX(min(220px, 45vw)) scale(0.95); }

    /* ---------- Photos view ---------- */
    .photo-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .photo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow-sm);
      text-align: left;
      width: 100%;
    }
    .photo-thumb {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13px;
      color: var(--ink-soft);
      text-align: center;
      line-height: 1.2;
      padding: 4px;
      background: linear-gradient(135deg, var(--surface-warm), #ECE3D2);
    }
    .photo-info { flex: 1; min-width: 0; }
    .photo-date {
      font-weight: 500;
      font-size: 14px;
      color: var(--ink);
    }
    .photo-meta {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 2px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 999px;
      margin-top: 6px;
    }
    .badge.good { background: #DDEEDD; color: #4F7A5C; }
    .badge.warn { background: #F8DCD2; color: #B95A3A; }
    .badge.pending { background: #F0EAD8; color: #8B7B4A; }

    /* Reconciliation diff (stub) */
    .diff-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .diff-panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow-sm);
    }
    .diff-panel h4 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .diff-ocr {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      color: var(--ink);
      background: var(--surface-warm);
      padding: 12px;
      border-radius: 10px;
      max-height: 240px;
      overflow-y: auto;
    }
    .extracted-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--surface-warm);
    }
    .extracted-row:last-child { border: none; }
    .extracted-row .er-body { flex: 1; min-width: 0; }
    .extracted-row .er-title { font-weight: 500; font-size: 14px; }
    .extracted-row .er-meta { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
    .er-actions { display: flex; gap: 6px; }
    .er-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .er-btn.accept { background: #DDEEDD; color: #4F7A5C; }
    .er-btn.edit { background: var(--surface-warm); color: var(--ink-soft); }
    .er-btn.reject { background: #F8DCD2; color: #B95A3A; }

    /* ---------- Settings view ---------- */
    .settings-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .settings-section h3 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      margin: 0 0 10px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--surface-warm);
      font-size: 14px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row .label { color: var(--ink-soft); }
    .settings-row .value { color: var(--ink); font-weight: 500; text-align: right; }
    .tag-mgmt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--surface-warm);
    }
    .tag-mgmt:last-of-type { border: none; }
    .tag-mgmt .swatch {
      width: 14px; height: 14px;
      border-radius: 50%;
    }
    .tag-mgmt .name { font-size: 14px; flex: 1; }
    .tag-mgmt .order { font-size: 12px; color: var(--ink-faint); }
    .link-btn {
      color: var(--accent);
      font-weight: 500;
      font-size: 14px;
      padding: 8px 0 2px;
    }

    /* ---------- Bottom nav ---------- */
    .bottom-nav {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-top: 1px solid rgba(46, 42, 38, 0.06);
      padding-bottom: var(--safe-bottom);
      z-index: 20;
    }
    .nav-inner {
      max-width: 480px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      height: var(--nav-h);
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--ink-faint);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .nav-btn svg { display: block; }
    .nav-btn.active { color: var(--accent); }

    /* ---------- Modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(46, 42, 38, 0.40);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
      animation: fade 0.18s ease;

    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .modal {

      border-radius: 22px 22px 0 0;

      margin: 0 0 18px;

      color: #fff;
      padding: 13px;
      border-radius: var(--radius);

    /* Tag swatch resolver classes */
    .c-indoor { --chip-color: var(--tag-indoor); --row-color: var(--tag-indoor); --primary-tag-color: var(--tag-indoor); }
    .c-outdoor { --chip-color: var(--tag-outdoor); --row-color: var(--tag-outdoor); --primary-tag-color: var(--tag-outdoor); }
    .c-day-trip { --chip-color: var(--tag-day-trip); --row-color: var(--tag-day-trip); --primary-tag-color: var(--tag-day-trip); }
    .c-mountains { --chip-color: var(--tag-mountains); --row-color: var(--tag-mountains); --primary-tag-color: var(--tag-mountains); }
    .c-playdate { --chip-color: var(--tag-playdate); --row-color: var(--tag-playdate); --primary-tag-color: var(--tag-playdate); }
    .c-chill { --chip-color: var(--tag-chill); --row-color: var(--tag-chill); --primary-tag-color: var(--tag-chill); }
    .c-errands { --chip-color: var(--tag-errands); --row-color: var(--tag-errands); --primary-tag-color: var(--tag-errands); }

      text-align: center;
      color: var(--ink-soft);
      padding: 40px 20px;
      background: var(--surface);
      border-radius: var(--radius);
      margin-top: 12px;

    .sync-hint {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12.5px;
      line-height: 1.45;
      color: var(--ink-soft);
      background: var(--surface-warm);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-top: 12px;

    .inline-notice {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      line-height: 1.45;
      color: #8B5A36;
      background: #FCEFE2;
      border: 1px solid #F3D7BF;
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      margin-bottom: 14px;

    .activity-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--surface-warm);

    .activity-item:last-of-type { border-bottom: none; }

      align-items: center;

      color: var(--ink-faint);

      background: var(--surface-warm);

      font-family: inherit;
      font-variant-numeric: tabular-nums;
      flex: 1;

    .backup-row {
      margin-top: 8px;

    .picker-search {

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }

    // Real API call. POSTs text/plain JSON to dodge a CORS preflight GAS cannot answer.
    // Injects the stored token; returns data or throws on ok:false / network error.
    async function apiCall(action, params) {
      const json = await apiCallRaw(action, params);
      // Most actions return {ok, data}; ping returns a flat object (no data wrapper).
      return json.data !== undefined ? json.data : json;
    }

    // Same call but returns the full envelope so callers can read sibling fields
    // like calendar_warning (a soft warning where the row saved but sync failed).
    async function apiCallRaw(action, params) {
      const body = JSON.stringify(Object.assign({ action, token: getToken() }, params || {}));
      const res = await fetch(API_URL, { method: 'POST', body });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'request failed');
      return json;
    }

    // Sheets stores booleans as TRUE/FALSE strings; normalize to JS booleans.
    function asBool(v) {
      if (v === true || v === false) return v;
      if (v === null || v === undefined || v === '') return false;
      return String(v).toUpperCase() === 'TRUE';
    }
    // Days.tags is a comma-separated string; split into a clean array.
    function splitTags(s) {
      if (Array.isArray(s)) return s.filter(Boolean);
      if (!s) return [];
      return String(s).split(',').map(t => t.trim()).filter(Boolean);

    // ============================================================
    // Helpers
    // ============================================================
    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function isoDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function parseISO(s) {
      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d);

    // Build a yyyy-MM-dd string from numeric parts (m is 1-based). Used by the
    // photo review pane to re-date candidates when the month/year is corrected.
    function ymdToIso(y, m, d) {
      return isoDate(new Date(y, m - 1, d));
    }
    function addDays(d, n) {
      const r = new Date(d);
      r.setDate(r.getDate() + n);
      return r;
    }
    function startOfWeek(d) {
      // Sunday-start
      const r = new Date(d);
      r.setDate(r.getDate() - r.getDay());
      return r;
    }

    const DOW_LONG = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const MONTH = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const MONTH_SHORT = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    function formatLongDate(d) {
      return `${DOW_LONG[d.getDay()]}, ${MONTH[d.getMonth()]} ${d.getDate()}`;
    }
    function formatWeekHeader(d) {
      return `Week of ${MONTH_SHORT[d.getMonth()]} ${d.getDate()}`;
    }
    function formatTime(t) {
      // t is "HH:MM" 24h
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const hr12 = ((h + 11) % 12) + 1;
      const ampm = h >= 12 ? 'pm' : 'am';
      return m === 0 ? `${hr12}${ampm}` : `${hr12}:${String(m).padStart(2, '0')}${ampm}`;

      return 'c-' + (tag || '').toLowerCase().replace(/\s+/g, '-');

      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      let total = h * 60 + m + mins;
      if (total >= 24 * 60) total = 24 * 60 - 1;
      const hh = String(Math.floor(total / 60)).padStart(2, '0');
      const mm = String(total % 60).padStart(2, '0');
      return hh + ':' + mm;

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => {
          const s = String(fr.result || '');
          const comma = s.indexOf(',');
          resolve(comma >= 0 ? s.slice(comma + 1) : s);

        fr.onerror = () => reject(new Error('Could not read file'));
