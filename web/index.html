<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#D17B5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KidPlan">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <title>KidPlan</title>
  <style>
    :root {
      --tag-indoor: #7AA6C2;
      --tag-outdoor: #8CC084;
      --tag-day-trip: #E8B25C;
      --tag-mountains: #4F7A5C;
      --tag-playdate: #E89B83;
      --tag-chill: #B8A6D9;
      --tag-errands: #B8A89A;

      --bg: #FBF8F3;
      --surface: #FFFFFF;
      --surface-warm: #F5EFE4;
      --ink: #2E2A26;
      --ink-soft: #786E64;
      --ink-faint: #B8AFA4;
      --accent: #D17B5C;
      --accent-soft: #F4D8CB;
      --good: #6FA378;
      --warn: #D17B5C;

      --radius-sm: 10px;
      --radius: 14px;
      --radius-lg: 20px;

      --shadow-sm: 0 1px 2px rgba(46, 42, 38, 0.05), 0 1px 3px rgba(46, 42, 38, 0.04);
      --shadow: 0 2px 6px rgba(46, 42, 38, 0.06), 0 4px 12px rgba(46, 42, 38, 0.05);
      --shadow-lg: 0 8px 24px rgba(46, 42, 38, 0.10);

      --nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);

      --font-display: 'Fraunces', ui-rounded, "SF Pro Rounded", system-ui, -apple-system, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 16px;
      line-height: 1.45;
      overscroll-behavior-y: none;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
    }
    button {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    a { color: var(--accent); text-decoration: none; }

    /* ---------- Layout ---------- */
    #root {
      max-width: 480px;
      margin: 0 auto;
      padding-top: calc(var(--safe-top) + 8px);
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 24px);
      min-height: 100dvh;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 4px;
    }
    .app-header .brand {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .app-header .brand .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 7px;
      vertical-align: middle;
      transform: translateY(-2px);
    }
    .app-header .header-actions { display: flex; gap: 10px; align-items: center; color: var(--ink-soft); }
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ink-soft);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }
    .icon-btn:active { transform: scale(0.96); }

    .view { padding: 12px 20px 24px; }
    .view-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 26px;
      letter-spacing: -0.01em;
      margin: 8px 0 4px;
    }
    .view-sub {
      color: var(--ink-soft);
      font-size: 14px;
      margin-bottom: 16px;
    }

    /* ---------- Today view ---------- */
    .today-hero {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 22px 22px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .today-hero::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: var(--primary-tag-color, var(--accent));
    }
    .today-date-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .today-date {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 24px;
      letter-spacing: -0.01em;
      line-height: 1.15;
    }
    .today-weather {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--ink-soft);
      background: var(--surface-warm);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .day-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 14px;
      color: var(--ink-soft);
      font-size: 13px;
    }
    .day-nav button {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ink-soft);
    }
    .day-nav button:hover { background: var(--surface-warm); }
    .day-nav .today-link {
      margin-left: auto;
      color: var(--accent);
      font-weight: 500;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface-warm);
      color: var(--ink-soft);
      border: 1px solid transparent;
    }
    .tag-chip.primary {
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--chip-color, var(--accent));
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .tag-chip .swatch {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--chip-color, var(--accent));
    }
    .tag-chip.outlined {
      background: transparent;
      border-color: var(--ink-faint);
      color: var(--ink-soft);
    }

    .plan-section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .plan-section h3 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 17px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .plan-section h3 .label-pill {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 3px 9px;
      border-radius: 999px;
    }
    .plan-section h3 .label-pill.b {
      background: #E6E0F0;
      color: #6F5BAA;
    }

    .kid-group { margin-top: 10px; }
    .kid-group:first-of-type { margin-top: 0; }
    .kid-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 8px 0 6px;
    }
    .plan-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--surface-warm);
    }
    .plan-item:last-child { border-bottom: none; }
    .plan-item .time {
      font-variant-numeric: tabular-nums;
      font-size: 13px;
      color: var(--ink-soft);
      min-width: 60px;
      padding-top: 1px;
    }
    .plan-item .body { flex: 1; }
    .plan-item .title { font-weight: 500; font-size: 15px; color: var(--ink); }
    .plan-item .location { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

    .plan-b-content {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 6px 0 2px;
    }
    .plan-b-content .body { flex: 1; }
    .plan-b-content .body .name { font-weight: 500; }
    .plan-b-content .body .desc { color: var(--ink-soft); font-size: 13px; margin-top: 3px; }
    .plan-b-content .chevron { color: var(--ink-faint); padding-top: 2px; }

    .cta-row { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      padding: 15px 20px;
      border-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(209, 123, 92, 0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:active { transform: translateY(1px); }
    .btn-secondary {
      width: 100%;
      background: var(--surface);
      color: var(--ink);
      font-weight: 500;
      font-size: 14px;
      padding: 12px 18px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ---------- Week view ---------- */
    .week-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .week-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 19px;
      letter-spacing: -0.01em;
    }
    .week-nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-soft);
    }
    .week-sub {
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .week-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .day-row {
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      min-height: 72px;
      text-align: left;
      width: 100%;
    }
    .day-row .stripe {
      width: 6px;
      background: var(--row-color, var(--ink-faint));
      flex-shrink: 0;
    }
    .day-row .day-content {
      flex: 1;
      padding: 12px 14px 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .day-row .date-block {
      flex-shrink: 0;
      width: 48px;
      text-align: center;
    }
    .day-row .dow {
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .day-row .dom {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 22px;
      line-height: 1.05;
      color: var(--ink);
    }
    .day-row .summary {
      flex: 1;
      min-width: 0;
    }
    .day-row .summary .primary-line {
      font-size: 14px;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .day-row .summary .tag-line {
      font-size: 11px;
      color: var(--ink-soft);
      margin-top: 2px;
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }
    .day-row .icons {
      display: flex;
      gap: 6px;
      color: var(--ink-faint);
      flex-shrink: 0;
    }
    .day-row.today { box-shadow: 0 0 0 2px var(--accent-soft), var(--shadow-sm); }

    /* ---------- Library view ---------- */
    .filter-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 12px;
      margin: 0 -4px 6px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface);
      color: var(--ink-soft);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .filter-chip .swatch {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--chip-color, var(--ink-faint));
    }
    .filter-chip.active {
      background: var(--ink);
      color: #fff;
    }
    .filter-chip.active .swatch { box-shadow: 0 0 0 2px var(--ink); }

    .library-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .library-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }
    .library-card .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .library-card .name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .library-card .swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--chip-color, var(--ink-faint));
    }
    .library-card .meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--ink-soft);
    }
    .library-card .desc {
      margin-top: 6px;
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.4;
    }
    .age-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface-warm);
      color: var(--ink-soft);
      font-weight: 500;
    }

    .fab {
      position: fixed;
      right: 50%;
      transform: translateX(min(220px, 45vw));
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 18px);
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(209, 123, 92, 0.40);
      z-index: 15;
    }
    .fab:active { transform: translateX(min(220px, 45vw)) scale(0.95); }

    /* ---------- Photos view ---------- */
    .photo-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .photo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow-sm);
      text-align: left;
      width: 100%;
    }
    .photo-thumb {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13px;
      color: var(--ink-soft);
      text-align: center;
      line-height: 1.2;
      padding: 4px;
      background: linear-gradient(135deg, var(--surface-warm), #ECE3D2);
    }
    .photo-info { flex: 1; min-width: 0; }
    .photo-date {
      font-weight: 500;
      font-size: 14px;
      color: var(--ink);
    }
    .photo-meta {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 2px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 999px;
      margin-top: 6px;
    }
    .badge.good { background: #DDEEDD; color: #4F7A5C; }
    .badge.warn { background: #F8DCD2; color: #B95A3A; }
    .badge.pending { background: #F0EAD8; color: #8B7B4A; }

    /* Reconciliation diff (stub) */
    .diff-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .diff-panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow-sm);
    }
    .diff-panel h4 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .diff-ocr {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      color: var(--ink);
      background: var(--surface-warm);
      padding: 12px;
      border-radius: 10px;
      max-height: 240px;
      overflow-y: auto;
    }
    .extracted-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--surface-warm);
    }
    .extracted-row:last-child { border: none; }
    .extracted-row .er-body { flex: 1; min-width: 0; }
    .extracted-row .er-title { font-weight: 500; font-size: 14px; }
    .extracted-row .er-meta { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
    .er-actions { display: flex; gap: 6px; }
    .er-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .er-btn.accept { background: #DDEEDD; color: #4F7A5C; }
    .er-btn.edit { background: var(--surface-warm); color: var(--ink-soft); }
    .er-btn.reject { background: #F8DCD2; color: #B95A3A; }

    /* ---------- Settings view ---------- */
    .settings-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .settings-section h3 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      margin: 0 0 10px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--surface-warm);
      font-size: 14px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row .label { color: var(--ink-soft); }
    .settings-row .value { color: var(--ink); font-weight: 500; text-align: right; }
    .tag-mgmt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--surface-warm);
    }
    .tag-mgmt:last-of-type { border: none; }
    .tag-mgmt .swatch {
      width: 14px; height: 14px;
      border-radius: 50%;
    }
    .tag-mgmt .name { font-size: 14px; flex: 1; }
    .tag-mgmt .order { font-size: 12px; color: var(--ink-faint); }
    .link-btn {
      color: var(--accent);
      font-weight: 500;
      font-size: 14px;
      padding: 8px 0 2px;
    }

    /* ---------- Bottom nav ---------- */
    .bottom-nav {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-top: 1px solid rgba(46, 42, 38, 0.06);
      padding-bottom: var(--safe-bottom);
      z-index: 20;
    }
    .nav-inner {
      max-width: 480px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      height: var(--nav-h);
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--ink-faint);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .nav-btn svg { display: block; }
    .nav-btn.active { color: var(--accent); }

    /* ---------- Modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(46, 42, 38, 0.40);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
      animation: fade 0.18s ease;
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--bg);
      border-radius: 22px 22px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 22px 22px calc(28px + var(--safe-bottom));
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal h3 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 19px;
      margin: 0 0 8px;
    }
    .modal p {
      color: var(--ink-soft);
      font-size: 14px;
      margin: 0 0 18px;
      line-height: 1.5;
    }
    .modal-close {
      width: 100%;
      background: var(--ink);
      color: #fff;
      padding: 13px;
      border-radius: var(--radius);

    // Real API call. POSTs text/plain JSON to dodge a CORS preflight GAS cannot answer.

    async function apiCall(action, params) {

      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'request failed');
      // Most actions return {ok, data}; ping returns a flat object (no data wrapper).
      return json.data !== undefined ? json.data : json;

      return String(v).toUpperCase() === 'TRUE';

        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

      return `${y}-${m}-${day}`;
    }

      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d);

      const r = new Date(d);
      r.setDate(r.getDate() + n);
      return r;
    }

      const r = new Date(d);
      r.setDate(r.getDate() - r.getDay());

      return `${DOW_LONG[d.getDay()]}, ${MONTH[d.getMonth()]} ${d.getDate()}`;

      // t is "HH:MM" 24h
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const hr12 = ((h + 11) % 12) + 1;
      const ampm = h >= 12 ? 'pm' : 'am';
      return m === 0 ? `${hr12}${ampm}` : `${hr12}:${String(m).padStart(2, '0')}${ampm}`;

          this.state.needsToken = false;
        }
        this.state.needsToken = false;
        this.state.booted = true;
        await this.loadView();
      },

      async saveTokenFromInput() {
        const input = document.getElementById('tokenInput');
        const val = (input && input.value || '').trim();
        if (!val) return;
        setToken(val);
        this.state.tokenError = '';
        this.state.needsToken = false;
        await this.boot();
      },

      changeToken() {
        clearToken();
        this.state.booted = false;
        this.state.needsToken = true;
        this.state.tokenError = '';
        this.render();
      },

      // ============================================================
      // Data loading (with loading + error states)
      // ============================================================
      async ensureTags() {
        if (this.data.tags.length) return;
        this.data.tags = await apiCall('list_tags', {});
        applyTagColors(this.data.tags);
      },

      async loadView() {
        this.state.loading = true;
        this.state.error = '';
        this.render();
        try {
          await this.ensureTags();
          const v = this.state.currentView;
          if (v === 'today') {
            const date = this.state.currentDate;
            // Library is needed for Plan B labels and the day editor dropdown.
            const [days, items, library] = await Promise.all([
              apiCall('list_days', { start: date, end: date }),
              apiCall('list_plan_items', { date }),
              apiCall('list_library', {})
            ]);
            this.data.day = (days && days[0]) || null;
            this.data.items = items || [];
            this.data.library = library || [];
          } else if (v === 'week') {
            const start = parseISO(this.state.weekStart);
            const end = isoDate(addDays(start, 6));
            this.data.weekDays = await apiCall('list_days', { start: this.state.weekStart, end });
          } else if (v === 'library') {
            this.data.library = await apiCall('list_library', {});
          } else if (v === 'settings') {
            this.data.settings = await apiCall('get_settings', {});
          }
          this.state.loading = false;
        } catch (e) {
          this.state.loading = false;
          this.state.error = e.message || 'Something went wrong';
        }
        this.render();
      },

      retry() { this.loadView(); },

      navigate(view, params) {
        this.state.currentView = view;
        if (params) Object.assign(this.state, params);
        this.loadView();
      },

      jumpToDay(date) {
        this.state.currentDate = date;
        this.state.currentView = 'today';
        this.loadView();
      },

      shiftDay(delta) {
        const d = parseISO(this.state.currentDate);
        this.state.currentDate = isoDate(addDays(d, delta));
        this.loadView();
      },

      shiftWeek(delta) {
        const d = parseISO(this.state.weekStart);
        this.state.weekStart = isoDate(addDays(d, delta * 7));
        this.loadView();
      },

      goToToday() {
        this.state.currentDate = isoDate(new Date());
        this.state.weekStart = isoDate(startOfWeek(new Date()));
        this.loadView();
      },

      setLibraryFilter(tag) {
        this.state.libraryFilter = tag;
        this.render();
      },

      openModal(modal) {
        this.state.modal = modal;
        this.render();
      },

      closeModal() {
        this.state.modal = null;
        this.render();
      },

      stubPhotoUpload() {
        this.openModal({ kind: 'info', title: 'Sync paper calendar', body: 'Camera capture and OCR reconciliation land in Wave 4.' });
      },

      // ============================================================
      // Render
      // ============================================================
      render() {
        const root = document.getElementById('root');
        const nav = document.getElementById('bottomNav');

        // Token onboarding gate - no app chrome, no nav.
        if (this.state.needsToken) {
          nav.innerHTML = '';
          root.innerHTML = this.viewTokenGate();
          window.scrollTo(0, 0);
          const input = document.getElementById('tokenInput');
          if (input) input.focus();
          return;
        }

        let view;
        if (this.state.loading) {
          view = this.viewLoading();
        } else if (this.state.error) {
          view = this.viewError();
        } else {
          switch (this.state.currentView) {
            case 'today':    view = this.viewToday(); break;
            case 'week':     view = this.viewWeek(); break;
            case 'library':  view = this.viewLibrary(); break;
            case 'photos':   view = this.viewPhotos(); break;
            case 'settings': view = this.viewSettings(); break;
            default:         view = this.viewToday();
          }
        }

        const canEditDay = this.state.currentView === 'today' && !this.state.loading && !this.state.error;
        root.innerHTML = `
          <header class="app-header">
            <div class="brand"><span class="dot"></span>KidPlan</div>
            <div class="header-actions">
              ${canEditDay ? `<button class="icon-btn" onclick="app.openDayEditor()" aria-label="Edit day">${ICONS.pencil}</button>` : ''}
            </div>
          </header>
          ${view}
          ${this.renderModal()}
        `;

        this.renderNav();
        window.scrollTo(0, 0);
      },

      viewTokenGate() {
        return `
          <main class="view" style="max-width:380px; margin:0 auto; padding-top:14vh;">
            <div class="brand" style="font-family:var(--font-display); font-weight:600; font-size:30px; margin-bottom:6px;">
              <span class="dot" style="display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--accent);margin-right:9px;"></span>KidPlan
            </div>
            <div class="view-sub" style="margin-bottom:22px;">Enter your access token to connect.</div>
            <div class="plan-section">
              <input id="tokenInput" type="password" autocomplete="off" autocapitalize="off" spellcheck="false"
                placeholder="Access token"
                style="width:100%; padding:14px; border:1px solid var(--ink-faint); border-radius:var(--radius); font-size:15px; background:var(--surface); margin-bottom:12px;"
                onkeydown="if(event.key==='Enter') app.saveTokenFromInput()">
              ${this.state.tokenError ? `<div style="color:var(--warn); font-size:13px; margin-bottom:12px;">${escapeHtml(this.state.tokenError)}</div>` : ''}
              <button class="btn-primary" onclick="app.saveTokenFromInput()">Save and connect</button>
            </div>
          </main>
        `;
      },

      viewLoading() {
        return `<main class="view"><div class="empty-state">Loading…</div></main>`;
      },

      viewError() {
        return `
          <main class="view">
            <div class="empty-state">
              <div style="margin-bottom:14px;">Could not reach KidPlan.<br><span style="font-size:13px;">${escapeHtml(this.state.error)}</span></div>
              <button class="btn-secondary" style="max-width:200px;margin:0 auto;" onclick="app.retry()">Try again</button>
            </div>
          </main>
        `;
      },

      renderNav() {
        const nav = document.getElementById('bottomNav');
        const cur = this.state.currentView;
        const tabs = [
          { id: 'today', label: 'Today', icon: 'calendar' },
          { id: 'week', label: 'Week', icon: 'week' },
          { id: 'library', label: 'Library', icon: 'bookmark' },
          { id: 'photos', label: 'Photos', icon: 'camera' },
          { id: 'settings', label: 'Settings', icon: 'gear' }
        ];
        nav.innerHTML = `
          <div class="nav-inner">
            ${tabs.map(t => `
              <button class="nav-btn ${cur === t.id ? 'active' : ''}" onclick="app.navigate('${t.id}')" aria-label="${t.label}">
                ${ICONS[t.icon](cur === t.id)}
                <span>${t.label}</span>
              </button>
            `).join('')}
          </div>
        `;
      },

      renderModal() {
        const m = this.state.modal;
        if (!m) return '';
        let inner;
        switch (m.kind) {
          case 'dayEditor': inner = this.renderDayEditor(m); break;
          case 'planItem':  inner = this.renderPlanItemEditor(m); break;
          case 'duplicate': inner = this.renderDuplicateEditor(m); break;
          case 'library':   inner = this.renderLibraryEditor(m); break;
          case 'tag':       inner = this.renderTagEditor(m); break;
          default:          inner = this.renderInfoModal(m); break;
        }
        return `
          <div class="modal-backdrop" onclick="if(event.target===this) app.closeModal()">
            <div class="modal" style="max-height:90vh; overflow-y:auto;">
              ${inner}
            </div>
          </div>
        `;
      },

      renderInfoModal(m) {
        return `
          <h3>${escapeHtml(m.title)}</h3>
          <p>${escapeHtml(m.body)}</p>
          <button class="modal-close" onclick="app.closeModal()">Got it</button>
        `;
      },

      // Reusable bits for editor modals.
      tagOptions(selected) {
        return this.data.tags.map(t =>
          `<option value="${escapeHtml(t.tag)}" ${t.tag === selected ? 'selected' : ''}>${escapeHtml(tagLabel(t.tag))}</option>`
        ).join('');
      },

      modalHeader(title) {
        return `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
            <h3 style="margin:0;">${escapeHtml(title)}</h3>
            <button class="icon-btn" onclick="app.closeModal()" aria-label="Close">${ICONS.x}</button>
          </div>
        `;
      },

      // ---------- Day editor ----------
      openDayEditor() {
        const date = this.state.currentDate;
        const day = this.data.day || { date, primary_tag: this.data.tags[0] ? this.data.tags[0].tag : '', tags: '', plan_b_pointer: 'custom', plan_b_custom_text: '', notes: '', confidence: 'planned', weather_sensitive: false };
        this.openModal({ kind: 'dayEditor', day });
      },

      renderDayEditor(m) {
        const day = m.day;
        const secondary = splitTags(day.tags).filter(t => t !== day.primary_tag);
        const pointer = day.plan_b_pointer || 'custom';
        const libOpts = (this.data.library || []).map(l =>
          `<option value="${escapeHtml(l.id)}" ${pointer === l.id ? 'selected' : ''}>${escapeHtml(l.name)}</option>`).join('');
        const fld = 'margin-bottom:14px;';
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        return `
          ${this.modalHeader('Edit ' + formatLongDate(parseISO(day.date)))}
          <div style="${fld}">
            <label style="${lbl}">Primary tag</label>
            <select id="de_primary" style="${inp}">${this.tagOptions(day.primary_tag)}</select>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Secondary tags</label>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
              ${this.data.tags.map(t => {
                if (t.tag === day.primary_tag) return '';
                const on = secondary.includes(t.tag);
                return `<button type="button" id="de_sec_${escapeHtml(t.tag)}" class="tag-chip ${on ? 'primary' : 'outlined'} ${tagClass(t.tag)}" data-on="${on ? '1' : '0'}" onclick="app.toggleSecondaryTag('${escapeHtml(t.tag)}')">${escapeHtml(tagLabel(t.tag))}</button>`;
              }).join('')}
            </div>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Plan A summary</label>
            <input id="de_summary" style="${inp}" value="${escapeHtml(day.plan_a_summary || '')}" placeholder="The day's main plan">
          </div>
          <div style="${fld}">
            <label style="${lbl}">Plan B</label>
            <select id="de_pointer" style="${inp} margin-bottom:8px;" onchange="document.getElementById('de_custom').style.display = this.value==='custom' ? 'block':'none'">
              <option value="custom" ${pointer === 'custom' ? 'selected' : ''}>Custom text…</option>
              ${libOpts}
            </select>
            <textarea id="de_custom" rows="2" style="${inp} display:${pointer === 'custom' ? 'block' : 'none'};" placeholder="Custom Plan B">${escapeHtml(day.plan_b_custom_text || '')}</textarea>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Notes</label>
            <textarea id="de_notes" rows="2" style="${inp}" placeholder="Gear, who's driving…">${escapeHtml(day.notes || '')}</textarea>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Confidence</label>
            <select id="de_conf" style="${inp}">
              ${['planned','tentative','locked'].map(c => `<option value="${c}" ${day.confidence === c ? 'selected' : ''}>${tagLabel(c)}</option>`).join('')}
            </select>
          </div>
          <label style="display:flex; align-items:center; gap:10px; ${fld} font-size:14px;">
            <input type="checkbox" id="de_weather" ${asBool(day.weather_sensitive) ? 'checked' : ''} style="width:18px;height:18px;">
            Weather-sensitive
          </label>
          <button class="btn-primary" onclick="app.saveDay()">Save day</button>
        `;
      },

      toggleSecondaryTag(tag) {
        const btn = document.getElementById('de_sec_' + tag);
        if (!btn) return;
        const on = btn.getAttribute('data-on') === '1';
        btn.setAttribute('data-on', on ? '0' : '1');
        btn.className = 'tag-chip ' + (on ? 'outlined' : 'primary') + ' ' + tagClass(tag);
      },

      async saveDay() {
        const primary = document.getElementById('de_primary').value;
        const secondary = this.data.tags
          .map(t => t.tag)
          .filter(t => t !== primary && document.getElementById('de_sec_' + t) && document.getElementById('de_sec_' + t).getAttribute('data-on') === '1');
        const allTags = [primary].concat(secondary);
        const pointer = document.getElementById('de_pointer').value;
        const params = {
          date: this.state.modal.day.date,
          primary_tag: primary,
          tags: allTags.join(','),
          plan_a_summary: document.getElementById('de_summary').value,
          plan_b_pointer: pointer,
          plan_b_custom_text: pointer === 'custom' ? document.getElementById('de_custom').value : '',
          notes: document.getElementById('de_notes').value,
          confidence: document.getElementById('de_conf').value,
          weather_sensitive: document.getElementById('de_weather').checked ? 'TRUE' : 'FALSE'
        };
        try {
          this.data.day = await apiCall('upsert_day', params);
          this.closeModal();
          this.loadView();
        } catch (e) {
          alert('Could not save: ' + e.message);
        }
      },

      // ---------- Plan item editor ----------
      openPlanItem(id) {
        let item;
        if (id) {
          item = (this.data.items || []).find(it => it.id === id) || null;
        }
        if (!item) item = { id: '', date: this.state.currentDate, kid: 'shared', title: '', start_time: '', end_time: '', location: '', tag: '' };
        this.openModal({ kind: 'planItem', item });
      },

      renderPlanItemEditor(m) {
        const it = m.item;
        const fld = 'margin-bottom:14px;';
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        const lanes = [['shared','Shared'],['elder','Elder'],['younger','Younger']];
        return `
          ${this.modalHeader(it.id ? 'Edit item' : 'Add item')}
          <div style="${fld}">
            <label style="${lbl}">Lane</label>
            <select id="pi_kid" style="${inp}">
              ${lanes.map(([v,l]) => `<option value="${v}" ${it.kid === v ? 'selected' : ''}>${l}</option>`).join('')}
            </select>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Title</label>
            <input id="pi_title" style="${inp}" value="${escapeHtml(it.title || '')}" placeholder="What's happening">
          </div>
          <div style="display:flex; gap:10px; ${fld}">
            <div style="flex:1;"><label style="${lbl}">Start</label><input id="pi_start" type="time" style="${inp}" value="${escapeHtml(it.start_time || '')}"></div>
            <div style="flex:1;"><label style="${lbl}">End</label><input id="pi_end" type="time" style="${inp}" value="${escapeHtml(it.end_time || '')}"></div>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Location</label>
            <input id="pi_loc" style="${inp}" value="${escapeHtml(it.location || '')}" placeholder="Optional">
          </div>
          <div style="${fld}">
            <label style="${lbl}">Tag</label>
            <select id="pi_tag" style="${inp}"><option value="">(use day's tag)</option>${this.tagOptions(it.tag)}</select>
          </div>
          <button class="btn-primary" onclick="app.savePlanItem()">Save item</button>
          ${it.id ? `<button class="btn-secondary" style="margin-top:10px; color:var(--warn);" onclick="app.deletePlanItem('${escapeHtml(it.id)}')">Delete item</button>` : ''}
        `;
      },

      async savePlanItem() {
        const it = this.state.modal.item;
        const title = document.getElementById('pi_title').value.trim();
        if (!title) { alert('Title is required'); return; }
        const params = {
          date: it.date,
          kid: document.getElementById('pi_kid').value,
          title,
          start_time: document.getElementById('pi_start').value,
          end_time: document.getElementById('pi_end').value,
          location: document.getElementById('pi_loc').value,
          tag: document.getElementById('pi_tag').value
        };
        if (it.id) params.id = it.id;
        try {
          await apiCall('upsert_plan_item', params);
          this.closeModal();
          this.loadView();
        } catch (e) {
          alert('Could not save: ' + e.message);
        }
      },

      async deletePlanItem(id) {
        // Optimistic: drop locally and re-render, then confirm with server.
        const prev = this.data.items;
        this.data.items = prev.filter(it => it.id !== id);
        this.closeModal();
        this.render();
        try {
          await apiCall('delete_plan_item', { id });
          this.loadView();
        } catch (e) {
          this.data.items = prev;
          this.render();
          alert('Could not delete: ' + e.message);
        }
      },

      // ---------- Duplicate day to range ----------
      openDuplicate() {
        this.openModal({ kind: 'duplicate' });
      },

      renderDuplicateEditor() {
        const start = this.state.currentDate;
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        return `
          ${this.modalHeader('Copy day to a range')}
          <p style="margin-bottom:14px;">Copies ${escapeHtml(formatLongDate(parseISO(start)))} (plan + items) onto every date in the range.</p>
          <div style="display:flex; gap:10px; margin-bottom:14px;">
            <div style="flex:1;"><label style="${lbl}">From</label><input id="dup_start" type="date" style="${inp}" value="${escapeHtml(start)}"></div>
            <div style="flex:1;"><label style="${lbl}">To</label><input id="dup_end" type="date" style="${inp}" value="${escapeHtml(start)}"></div>
          </div>
          <button class="btn-primary" onclick="app.runDuplicate()">Copy</button>
        `;
      },

      async runDuplicate() {
        const params = {
          source_date: this.state.currentDate,
          range_start: document.getElementById('dup_start').value,
          range_end: document.getElementById('dup_end').value
        };
        try {
          const res = await apiCall('duplicate_day_to_range', params);
          this.openModal({ kind: 'info', title: 'Copied', body: `${res.days_created} day(s) and ${res.plan_items_created} item(s) created.` });
        } catch (e) {
          alert('Could not copy: ' + e.message);
        }
      },

      // ---------- Library editor ----------
      openLibraryEditor(id) {
        let item = id ? (this.data.library || []).find(l => l.id === id) : null;
        if (!item) item = { id: '', name: '', tag: this.data.tags[0] ? this.data.tags[0].tag : '', description: '', indoor: true, typical_duration_min: '', kid_age_fit: 'both', notes: '' };
        this.openModal({ kind: 'library', item });
      },

      renderLibraryEditor(m) {
        const it = m.item;
        const fld = 'margin-bottom:14px;';
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        return `
          ${this.modalHeader(it.id ? 'Edit fallback' : 'Add fallback')}
          <div style="${fld}"><label style="${lbl}">Name</label><input id="lib_name" style="${inp}" value="${escapeHtml(it.name || '')}"></div>
          <div style="${fld}"><label style="${lbl}">Tag</label><select id="lib_tag" style="${inp}">${this.tagOptions(it.tag)}</select></div>
          <div style="${fld}"><label style="${lbl}">Description</label><textarea id="lib_desc" rows="2" style="${inp}">${escapeHtml(it.description || '')}</textarea></div>
          <div style="display:flex; gap:10px; ${fld}">
            <div style="flex:1;"><label style="${lbl}">Duration (min)</label><input id="lib_dur" type="number" style="${inp}" value="${escapeHtml(it.typical_duration_min || '')}"></div>
            <div style="flex:1;"><label style="${lbl}">Age fit</label><select id="lib_age" style="${inp}">${['any','young','older','both'].map(a => `<option value="${a}" ${it.kid_age_fit === a ? 'selected' : ''}>${tagLabel(a)}</option>`).join('')}</select></div>
          </div>
          <label style="display:flex; align-items:center; gap:10px; ${fld} font-size:14px;">
            <input type="checkbox" id="lib_indoor" ${asBool(it.indoor) ? 'checked' : ''} style="width:18px;height:18px;"> Indoor
          </label>
          <div style="${fld}"><label style="${lbl}">Notes</label><textarea id="lib_notes" rows="2" style="${inp}">${escapeHtml(it.notes || '')}</textarea></div>
          <button class="btn-primary" onclick="app.saveLibrary()">Save</button>
          ${it.id ? `<button class="btn-secondary" style="margin-top:10px; color:var(--warn);" onclick="app.deleteLibrary('${escapeHtml(it.id)}')">Delete</button>` : ''}
        `;
      },

      async saveLibrary() {
        const it = this.state.modal.item;
        const name = document.getElementById('lib_name').value.trim();
        if (!name) { alert('Name is required'); return; }
        const params = {
          name,
          tag: document.getElementById('lib_tag').value,
          description: document.getElementById('lib_desc').value,
          typical_duration_min: document.getElementById('lib_dur').value,
          kid_age_fit: document.getElementById('lib_age').value,
          indoor: document.getElementById('lib_indoor').checked ? 'TRUE' : 'FALSE',
          notes: document.getElementById('lib_notes').value
        };
        if (it.id) params.id = it.id;
        try {
          await apiCall('upsert_library', params);
          this.closeModal();
          this.loadView();
        } catch (e) {
          alert('Could not save: ' + e.message);
        }
      },

      async deleteLibrary(id) {
        try {
          await apiCall('delete_library', { id });
          this.closeModal();
          this.loadView();
        } catch (e) {
          alert('Could not delete: ' + e.message);
        }
      },

      // ---------- Tag editor ----------
      openTagEditor(tag) {
        let item = tag ? (this.data.tags || []).find(t => t.tag === tag) : null;
        if (!item) item = { tag: '', color: '#B8A6D9', display_order: (this.data.tags.length + 1) };
        this.openModal({ kind: 'tag', item });
      },

      renderTagEditor(m) {
        const it = m.item;
        const fld = 'margin-bottom:14px;';
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        return `
          ${this.modalHeader(it.tag ? 'Edit tag' : 'Add tag')}
          <div style="${fld}"><label style="${lbl}">Tag (lowercase)</label><input id="tag_name" style="${inp}" value="${escapeHtml(it.tag || '')}" ${it.tag ? 'readonly' : ''} placeholder="e.g. beach-day"></div>
          <div style="${fld}"><label style="${lbl}">Color</label><input id="tag_color" type="color" style="width:60px; height:40px; border:none; background:none;" value="${escapeHtml(it.color || '#B8A6D9')}"></div>
          <div style="${fld}"><label style="${lbl}">Display order</label><input id="tag_order" type="number" style="${inp}" value="${escapeHtml(it.display_order || '')}"></div>
          <button class="btn-primary" onclick="app.saveTag()">Save tag</button>
        `;
      },

      async saveTag() {
        const tag = document.getElementById('tag_name').value.trim().toLowerCase();
        if (!tag) { alert('Tag is required'); return; }
        const params = {
          tag,
          color: document.getElementById('tag_color').value,
          display_order: document.getElementById('tag_order').value
        };
        try {
          await apiCall('upsert_tag', params);
          this.data.tags = [];
          this.closeModal();
          this.loadView();
        } catch (e) {
          alert('Could not save: ' + e.message);
        }
      },

      // ============================================================
      // TODAY
      // ============================================================
      viewToday() {
        const date = this.state.currentDate;
        const day = this.data.day;
        const items = this.data.items || [];
        const d = parseISO(date);

        // No plan saved for this date yet.
        if (!day) {
          return `
            <main class="view">
              <div class="today-hero">
                <div class="today-date-row"><div class="today-date">${escapeHtml(formatLongDate(d))}</div></div>
                <div class="day-nav">
                  <button onclick="app.shiftDay(-1)" aria-label="Previous day">${ICONS.chevL}</button>
                  <button onclick="app.shiftDay(1)" aria-label="Next day">${ICONS.chevR}</button>
                  <button class="today-link" onclick="app.goToToday()">Jump to today</button>
                </div>
              </div>
              <div class="empty-state">
                <div style="margin-bottom:14px;">No plan yet — add one.</div>
                <button class="btn-secondary" style="max-width:200px;margin:0 auto;" onclick="app.openDayEditor()">${ICONS.pencil} Add a plan</button>
              </div>
            </main>
          `;
        }

        const grouped = { shared: [], elder: [], younger: [] };
        items.forEach(it => { if (grouped[it.kid]) grouped[it.kid].push(it); });
        Object.keys(grouped).forEach(k => grouped[k].sort((a, b) => (a.start_time || '').localeCompare(b.start_time || '')));

        const renderItem = (it) => `
          <button class="plan-item" style="width:100%;text-align:left;background:none;" onclick="app.openPlanItem('${escapeHtml(it.id)}')">
            <div class="time">${escapeHtml(formatTime(it.start_time))}</div>
            <div class="body">
              <div class="title">${escapeHtml(it.title)}</div>
              ${it.location ? `<div class="location">${escapeHtml(it.location)}</div>` : ''}
            </div>
          </button>
        `;
        const renderGroup = (label, arr) => {
          if (!arr.length) return '';
          return `<div class="kid-group"><div class="kid-label">${escapeHtml(label)}</div>${arr.map(renderItem).join('')}</div>`;
        };

        const planBLibrary = (day.plan_b_pointer && day.plan_b_pointer !== 'custom')
          ? (this.data.library || []).find(l => l.id === day.plan_b_pointer)
          : null;

        let planBHtml;
        if (planBLibrary) {
          planBHtml = `
            <div class="plan-b-content" onclick="app.navigate('library')">
              <div class="body"><div class="name">${escapeHtml(planBLibrary.name)}</div><div class="desc">${escapeHtml(planBLibrary.description)}</div></div>
              <div class="chevron">${ICONS.chevR}</div>
            </div>`;
        } else if (day.plan_b_pointer && day.plan_b_pointer !== 'custom') {
          // Pointer references a library id we have not loaded into the cache.
          planBHtml = `<div class="plan-b-content"><div class="body"><div class="desc">Linked fallback (open Library to view).</div></div></div>`;
        } else if (day.plan_b_custom_text) {
          planBHtml = `<div class="plan-b-content"><div class="body"><div class="desc" style="font-size:14px; color:var(--ink);">${escapeHtml(day.plan_b_custom_text)}</div></div></div>`;
        } else {
          planBHtml = `<div class="plan-b-content"><div class="body"><div class="desc">No Plan B set yet.</div></div></div>`;
        }

        const dayTags = splitTags(day.tags);
        const otherTags = dayTags.filter(t => t !== day.primary_tag);

        return `
          <main class="view">
            <div class="today-hero ${tagClass(day.primary_tag)}">
              <div class="today-date-row">
                <div class="today-date">${escapeHtml(formatLongDate(d))}</div>
                ${asBool(day.weather_sensitive) ? `<div class="today-weather">${ICONS.rain} weather-sensitive</div>` : ''}
              </div>
              <div class="day-nav">
                <button onclick="app.shiftDay(-1)" aria-label="Previous day">${ICONS.chevL}</button>
                <button onclick="app.shiftDay(1)" aria-label="Next day">${ICONS.chevR}</button>
                <button class="today-link" onclick="app.goToToday()">Jump to today</button>
              </div>
              <div class="tag-row">
                <span class="tag-chip primary ${tagClass(day.primary_tag)}">${escapeHtml(tagLabel(day.primary_tag))}</span>
                ${otherTags.map(t => `<span class="tag-chip outlined ${tagClass(t)}"><span class="swatch"></span>${escapeHtml(tagLabel(t))}</span>`).join('')}
              </div>
            </div>

            <section class="plan-section">
              <h3>Plan A <span class="label-pill">plan</span></h3>
              ${items.length
                ? renderGroup('Shared', grouped.shared) + renderGroup('Elder', grouped.elder) + renderGroup('Younger', grouped.younger)
                : (day.plan_a_summary
                    ? `<div class="plan-item"><div class="body"><div class="title" style="color:var(--ink-soft); font-weight:400;">${escapeHtml(day.plan_a_summary)}</div></div></div>`
                    : `<div class="plan-item"><div class="body"><div class="title" style="color:var(--ink-soft); font-weight:400;">No items yet</div></div></div>`)
              }
              <button class="link-btn" onclick="app.openPlanItem()">+ Add item</button>
            </section>

            <section class="plan-section">
              <h3>Plan B <span class="label-pill b">backup</span></h3>
              ${planBHtml}
            </section>

            <div class="cta-row">
              <button class="btn-primary" onclick="app.openDayEditor()">${ICONS.pencil} Edit this day</button>
              <button class="btn-secondary" onclick="app.openDuplicate()">${ICONS.calendar(false)} Copy this day to a date range</button>
            </div>
          </main>
        `;
      },

      // ============================================================
      // WEEK
      // ============================================================
      viewWeek() {
        const start = parseISO(this.state.weekStart);
        const dates = Array.from({length: 7}, (_, i) => isoDate(addDays(start, i)));
        // Merge live day rows onto the 7-day skeleton (missing days render empty).
        const byDate = {};
        (this.data.weekDays || []).forEach(x => { byDate[x.date] = x; });
        const days = dates.map(d => byDate[d] || { date: d, primary_tag: null, tags: '', plan_a_summary: '', weather_sensitive: false, plan_b_pointer: null });
        const todayIso = isoDate(new Date());

        return `
          <main class="view">
            <div class="week-header">
              <button class="week-nav-btn" onclick="app.shiftWeek(-1)" aria-label="Previous week">${ICONS.chevL}</button>
              <div class="week-title">${escapeHtml(formatWeekHeader(start))}</div>
              <button class="week-nav-btn" onclick="app.shiftWeek(1)" aria-label="Next week">${ICONS.chevR}</button>
            </div>
            <div class="week-sub"><a onclick="app.goToToday()" style="cursor:pointer;">Jump to today</a></div>

            <div class="week-list">
              ${days.map(day => {
                const d = parseISO(day.date);
                const tags = splitTags(day.tags);
                const indoor = tags.includes('indoor');
                const outdoor = tags.includes('outdoor');
                const isToday = day.date === todayIso;
                const isPlanBCustom = day.plan_b_pointer === 'custom';
                const isPlanBLibrary = day.plan_b_pointer && day.plan_b_pointer !== 'custom';
                return `
                  <button class="day-row ${day.primary_tag ? tagClass(day.primary_tag) : ''} ${isToday ? 'today' : ''}" onclick="app.jumpToDay('${day.date}')">
                    <div class="stripe"></div>
                    <div class="day-content">
                      <div class="date-block">
                        <div class="dow">${DOW[d.getDay()]}</div>
                        <div class="dom">${d.getDate()}</div>
                      </div>
                      <div class="summary">
                        <div class="primary-line">${escapeHtml(day.plan_a_summary || '— no plan yet —')}</div>
                        <div class="tag-line">${tags.map(t => escapeHtml(tagLabel(t).toLowerCase())).join(' · ') || '&nbsp;'}</div>
                      </div>
                      <div class="icons">
                        ${asBool(day.weather_sensitive) ? ICONS.rain : ''}
                        ${indoor && !outdoor ? ICONS.indoor : ''}
                        ${outdoor && !indoor ? ICONS.outdoor : ''}
                        ${isPlanBLibrary ? ICONS.bookmarkSm : ''}
                        ${isPlanBCustom ? ICONS.penSm : ''}
                      </div>
                    </div>
                  </button>
                `;
              }).join('')}
            </div>
          </main>
        `;
      },

      // ============================================================
      // LIBRARY
      // ============================================================
      viewLibrary() {
        const filter = this.state.libraryFilter;
        const all = this.data.library || [];
        const items = filter === 'all' ? all : all.filter(i => i.tag === filter);

        // Build filters from the loaded tag set (display_order).
        const sortedTags = [...this.data.tags].sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
        const filters = ['all'].concat(sortedTags.map(t => t.tag));

        const ageLabel = (a) => a === 'both' || a === 'any' ? 'all ages' : a;

        return `
          <main class="view">
            <h2 class="view-title">Library</h2>
            <div class="view-sub">Fallback activities for sick days, weather flips, and "nothing to do" afternoons.</div>

            <div class="filter-bar">
              ${filters.map(f => `
                <button class="filter-chip ${filter === f ? 'active' : ''} ${f !== 'all' ? tagClass(f) : ''}" onclick="app.setLibraryFilter('${escapeHtml(f)}')">
                  ${f !== 'all' ? '<span class="swatch"></span>' : ''}
                  ${escapeHtml(f === 'all' ? 'All' : tagLabel(f))}
                </button>
              `).join('')}
            </div>

            <div class="library-list">
              ${items.length ? items.map(it => `
                <button class="library-card" style="width:100%;text-align:left;background:var(--surface);" onclick="app.openLibraryEditor('${escapeHtml(it.id)}')">
                  <div class="top">
                    <div class="name ${tagClass(it.tag)}">
                      <span class="swatch"></span>
                      ${escapeHtml(it.name)}
                    </div>
                    <div class="meta">
                      ${asBool(it.indoor) ? ICONS.indoor : ICONS.outdoor}
                      <span class="age-pill">${escapeHtml(ageLabel(it.kid_age_fit))}</span>
                    </div>
                  </div>
                  ${it.description ? `<div class="desc">${escapeHtml(it.description)}</div>` : ''}
                </button>
              `).join('') : `<div class="empty-state">No fallbacks match this filter.</div>`}
            </div>
          </main>

          <button class="fab" onclick="app.openLibraryEditor()" aria-label="Add fallback">${ICONS.plus}</button>
        `;
      },

      // ============================================================
      // PHOTOS
      // ============================================================
      // Stub until Wave 4 wires camera capture + OCR reconciliation.
      viewPhotos() {
        return `
          <main class="view">
            <h2 class="view-title">Photos</h2>
            <div class="view-sub">Paper-calendar snapshots. Reconciliation surfaces what we extracted.</div>
            <div class="empty-state">
              <div style="margin-bottom:14px;">Photo capture and OCR reconciliation land in Wave 4.</div>
              <button class="btn-secondary" style="max-width:220px;margin:0 auto;" onclick="app.stubPhotoUpload()">${ICONS.camIcon} Take a photo</button>
            </div>
          </main>
        `;
      },

      // ============================================================
      // SETTINGS
      // ============================================================
      viewSettings() {
        const s = this.data.settings || {};
        const tags = [...this.data.tags].sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
        const family = s.family_calendar_id || '';
        const readOnly = (s.read_only_calendar_ids || '').split(',').map(x => x.trim()).filter(Boolean);
        const folder = s.photo_drive_folder_id || '';
        const mono = 'font-family: ui-monospace, Menlo, monospace; font-size: 12px; word-break:break-all;';

        return `
          <main class="view">
            <h2 class="view-title">Settings</h2>
            <div class="view-sub">Connected calendars and tags from the backend.</div>

            <div class="settings-section">
              <h3>Connected calendars</h3>
              <div class="settings-row">
                <span class="label">Write to (family)</span>
                <span class="value" style="${mono}">${escapeHtml(family || 'not set')}</span>
              </div>
              ${readOnly.length ? readOnly.map(c => `
                <div class="settings-row">
                  <span class="label">Read-only</span>
                  <span class="value" style="${mono}">${escapeHtml(c)}</span>
                </div>
              `).join('') : `<div class="settings-row"><span class="label">Read-only</span><span class="value">none</span></div>`}
            </div>

            <div class="settings-section">
              <h3>Photo upload</h3>
              <div class="settings-row">
                <span class="label">Drive folder</span>
                <span class="value" style="${mono}">${escapeHtml(folder || 'not set')}</span>
              </div>
            </div>

            <div class="settings-section">
              <h3>Tags</h3>
              ${tags.map(t => `
                <div class="tag-mgmt ${tagClass(t.tag)}" style="cursor:pointer;" onclick="app.openTagEditor('${escapeHtml(t.tag)}')">
                  <span class="swatch" style="background: ${escapeHtml(t.color || 'var(--chip-color)')};"></span>
                  <span class="name">${escapeHtml(tagLabel(t.tag))}</span>
                  <span class="order">order ${escapeHtml(t.display_order)}</span>
                </div>
              `).join('')}
              <button class="link-btn" onclick="app.openTagEditor()">+ Add tag</button>
            </div>

            <div class="settings-section">
              <h3>Access</h3>
              <div class="settings-row">
                <span class="label">Access token</span>
                <button class="link-btn" style="padding:0;" onclick="app.changeToken()">Change access token</button>
              </div>
            </div>

            <div class="settings-section">
              <h3>About</h3>
              <div class="settings-row">
                <span class="label">App</span>
                <span class="value">KidPlan</span>
              </div>
              <div class="settings-row">
                <span class="label">Build</span>
                <span class="value">Wave 3 - live</span>
              </div>
            </div>
          </main>
        `;
      }
    };

    // Boot - token gate then live load.
    document.addEventListener('DOMContentLoaded', () => app.boot());
    if (document.readyState !== 'loading') app.boot();

    // Register service worker placeholder (no SW file yet; safe no-op).
    // Wave 4 may add offline caching here.
  </script>
</body>
</html>
