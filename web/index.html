      chevL: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-9 6 9 6"/></svg>`,
      plus: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
      plusSm: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
      pencil: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l4-1 11-11-3-3L5 16l-1 4z"/></svg>`,
      camIcon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M9 4h6l1.5 2.5H20a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.5a2 2 0 0 1 2-2h3.5L9 4z"/><circle cx="12" cy="13.5" r="3.5"/></svg>`,
      check: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>`,
      x: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`,
    };

    // ============================================================
    // Single global app
    // ============================================================
    const app = {
      state: {
        booted: false,
        needsToken: false,
        tokenError: '',
        currentView: 'today',
        currentDate: isoDate(new Date()), // real today
        weekStart: isoDate(startOfWeek(new Date())),
        libraryFilter: 'all',
        pickerFilter: 'all',
        pickerSearch: '',
        modal: null,
        // Transient inline notice shown on Today when a save could not sync to calendar.
        calendarNotice: '',
        // per-view async status: 'loading' | 'ready' | 'error'
        loading: false,
        error: ''
      },

      // Live data cache, populated by loadView().
      data: {
        tags: [],
        items: [],          // PlanItems on the current day (today view)
        externals: [],      // external calendar events on the current day/week
        weekItems: [],      // PlanItems across the visible week
        library: [],
        settings: null
      },

      // ============================================================
      // Boot + token gate
      // ============================================================
      async boot() {
        if (!getToken()) {
          this.state.needsToken = true;
          this.render();
          return;
        }
        // Verify the stored token before showing the app.
        try {
          const data = await apiCall('ping', {});
          if (!data || data.tokenOk !== true) {
            this.state.needsToken = true;
            this.state.tokenError = 'That token did not match. Try again.';
            clearToken();
            this.render();
            return;
          }
        } catch (e) {
          // Network failure during verify - let them in but views show retry.
          this.state.needsToken = false;
        }
        this.state.needsToken = false;
        this.state.booted = true;
        await this.loadView();
      },

      async saveTokenFromInput() {
        const input = document.getElementById('tokenInput');
        const val = (input && input.value || '').trim();
        if (!val) return;
        setToken(val);
        this.state.tokenError = '';
        this.state.needsToken = false;
        await this.boot();
      },

      changeToken() {
        clearToken();
        this.state.booted = false;
        this.state.needsToken = true;
        this.state.tokenError = '';
        this.render();
      },

      // ============================================================
      // Data loading (with loading + error states)
      // ============================================================
      async ensureTags() {
        if (this.data.tags.length) return;
        this.data.tags = await apiCall('list_tags', {});
        applyTagColors(this.data.tags);
      },

      async loadView() {
        this.state.loading = true;
        this.state.error = '';
        this.render();
        try {
          await this.ensureTags();
          const v = this.state.currentView;
          if (v === 'today') {
            const date = this.state.currentDate;
            // Library powers the picker; calendar events give us conflict awareness.
            const [items, library, events] = await Promise.all([
              apiCall('list_plan_items', { date }),
              apiCall('list_library', {}),
              apiCall('list_calendar_events', { start: date, end: date }).catch(() => [])
            ]);
            this.data.items = items || [];
            this.data.library = library || [];
            this.data.externals = (events || []).filter(e => e.source === 'external');
          } else if (v === 'week') {
            const start = parseISO(this.state.weekStart);
            const end = isoDate(addDays(start, 6));
            const [items, events] = await Promise.all([
              apiCall('list_plan_items', { start: this.state.weekStart, end }),
              apiCall('list_calendar_events', { start: this.state.weekStart, end }).catch(() => [])
            ]);
            this.data.weekItems = items || [];
            this.data.externals = (events || []).filter(e => e.source === 'external');
          } else if (v === 'library') {
            this.data.library = await apiCall('list_library', {});
          } else if (v === 'settings') {
            this.data.settings = await apiCall('get_settings', {});
          }
          this.state.loading = false;
        } catch (e) {
          this.state.loading = false;
          this.state.error = e.message || 'Something went wrong';
        }
        this.render();
      },

      retry() { this.loadView(); },

      navigate(view, params) {
        this.state.currentView = view;
        this.state.calendarNotice = '';
        if (params) Object.assign(this.state, params);
        this.loadView();
      },

      jumpToDay(date) {
        this.state.currentDate = date;
        this.state.currentView = 'today';
        this.loadView();
      },

      shiftDay(delta) {
        const d = parseISO(this.state.currentDate);
        this.state.currentDate = isoDate(addDays(d, delta));
        this.loadView();
      },

      shiftWeek(delta) {
        const d = parseISO(this.state.weekStart);
        this.state.weekStart = isoDate(addDays(d, delta * 7));
        this.loadView();
      },

      goToToday() {
        this.state.currentDate = isoDate(new Date());
        this.state.weekStart = isoDate(startOfWeek(new Date()));
        this.loadView();
      },

      setLibraryFilter(tag) {
        this.state.libraryFilter = tag;
        this.render();
      },

      openModal(modal) {
        this.state.modal = modal;
        this.render();
      },

      closeModal() {
        this.state.modal = null;
        this.render();
      },

      // Camera capture: opens a hidden file input with the mobile camera affordance,
      // base64-uploads to Drive via the backend, then runs Cloud Vision OCR and
      // shows the raw text. Structured parsing into PlanItems lands in Phase 4b.
      openPhotoCapture() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        // capture=environment on a mobile browser opens the rear camera; desktop
        // ignores it and just shows the file picker.
        input.setAttribute('capture', 'environment');
        input.onchange = () => this.onPhotoSelected(input.files && input.files[0]);
        input.click();
      },

      async onPhotoSelected(file) {
        if (!file) return;
        this.openModal({ kind: 'info', title: 'Uploading…', body: 'Saving photo to Drive.' });
        try {
          const base64 = await readFileAsBase64(file);
          const photo = await apiCall('upload_photo', {
            image_base64: base64,
            mime_type: file.type || 'image/jpeg',
            name: file.name || ''
          });
          this.openModal({ kind: 'info', title: 'Running OCR…', body: 'Cloud Vision is reading the photo.' });
          const updated = await apiCall('run_photo_ocr', { id: photo.id });
          let parsed = {};
          try { parsed = JSON.parse(updated.parsed_json || '{}'); } catch (e) { parsed = {}; }
          this.openPhotoReview(updated, parsed);
        } catch (e) {
          this.closeModal();
          alert('Photo flow failed: ' + e.message);
        }
      },

      // ---------- Photo review (Wave 4b) ----------
      // Take the parsed grid candidates and let the user accept/edit/reject each
      // before they become PlanItems. Day numbers come from the grid cell; the
      // month/year header re-dates everything client-side if Vision misread it.
      openPhotoReview(photo, parsed) {
        const cands = (parsed.candidates || []).map((c, i) => ({
          idx: i,
          // Everything detected starts ticked; untick to skip. (Untimed rows still
          // need a time set before they can be added - confirmReconcile enforces.)
          accept: true,
          day: c.day,
          date: c.date || '',
          title: c.title || '',
          start_time: c.start_time || '',
          end_time: c.end_time || '',
          kid: 'shared',
          location: c.location || '',
          raw: c.raw || '',
          confidence: c.confidence || 'ok',
        }));
        const now = new Date();
        this.openModal({
          kind: 'photoReview',
          photo: photo,
          rawText: photo.ocr_text || '',
          month: parsed.month || (now.getMonth() + 1),
          year: parsed.year || now.getFullYear(),
          candidates: cands,
          showRaw: false,
          lowStructure: !!parsed.low_structure,
          engine: parsed.engine || 'regex',
        });
      },

      renderPhotoReview(m) {
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:9px 10px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:14px; background:var(--surface); font-family:inherit;';
        const lanes = [['shared', 'Shared'], ['elder', 'Elder'], ['younger', 'Younger']];
        const monthOpts = MONTH.map((nm, i) => `<option value="${i + 1}" ${m.month === i + 1 ? 'selected' : ''}>${nm}</option>`).join('');
        const accepted = m.candidates.filter(c => c.accept).length;

        const rows = m.candidates.map(c => {
          const low = c.confidence === 'low'
            ? `<span title="Date assignment was ambiguous - double-check it" style="font-size:10px; font-weight:700; color:var(--warn); border:1px solid var(--warn); border-radius:10px; padding:1px 7px; white-space:nowrap;">check date</span>`
            : '';
          return `
            <div style="border:1px solid var(--ink-faint); border-radius:var(--radius-sm); padding:10px; margin-bottom:10px; ${c.accept ? '' : 'opacity:0.45;'}">
              <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                <input type="checkbox" id="rv_acc_${c.idx}" ${c.accept ? 'checked' : ''} onchange="app.toggleReviewRow(${c.idx})" style="width:18px; height:18px; flex:none;">
                <input id="rv_title_${c.idx}" style="${inp}" value="${escapeHtml(c.title)}" placeholder="Title">
                ${low}
              </div>
              <div style="display:flex; gap:8px; margin-bottom:8px;">
                <input id="rv_date_${c.idx}" type="date" style="${inp}" value="${escapeHtml(c.date)}">
                <input id="rv_start_${c.idx}" type="time" style="${inp}" value="${escapeHtml(c.start_time)}">
                <input id="rv_end_${c.idx}" type="time" style="${inp}" value="${escapeHtml(c.end_time)}" placeholder="end">
              </div>
              <select id="rv_kid_${c.idx}" style="${inp}">
                ${lanes.map(([v, l]) => `<option value="${v}" ${c.kid === v ? 'selected' : ''}>${l}</option>`).join('')}
              </select>
            </div>`;
        }).join('');

        const empty = m.candidates.length
          ? ''
          : `<p style="color:var(--ink-soft); font-size:14px; margin-bottom:14px;">${m.lowStructure ? "Couldn't read the calendar grid clearly." : 'No events were detected in this photo.'} You can still add activities from Today, or check the raw text below.</p>`;

        return `
          ${this.modalHeader('Review photo events')}
          <p style="font-size:13px; color:var(--ink-soft); margin-bottom:12px;">Confirm what Vision pulled off the paper calendar. Edit anything, untick to skip, then add the rest to your plan.</p>
          <p style="font-size:11px; color:${m.engine && m.engine.indexOf('gemini') === 0 ? 'var(--ink-faint)' : 'var(--warn)'}; margin:-6px 0 12px; word-break:break-word;">${m.engine && m.engine.indexOf('gemini') === 0 ? 'Cleaned by Gemini.' : escapeHtml('Basic parse — ' + (m.engine || 'unknown'))}</p>
          <div style="display:flex; gap:8px; margin-bottom:16px; align-items:flex-end;">
            <div style="flex:2;"><label style="${lbl}">Month</label><select id="rv_month" style="${inp}" onchange="app.setReviewMonthYear()">${monthOpts}</select></div>
            <div style="flex:1;"><label style="${lbl}">Year</label><input id="rv_year" type="number" style="${inp}" value="${m.year}" onchange="app.setReviewMonthYear()"></div>
          </div>
          ${empty}
          ${rows}
          ${m.candidates.length ? `<button class="btn-primary" style="margin-top:4px;" onclick="app.confirmReconcile()">Add ${accepted} event${accepted === 1 ? '' : 's'}</button>` : ''}
          <button class="btn-secondary" style="margin-top:10px;" onclick="app.toggleReviewRaw()">${m.showRaw ? 'Hide' : 'Show'} raw OCR text</button>
          ${m.showRaw ? `<pre style="background:var(--surface-warm); padding:12px; border-radius:8px; font-size:12px; white-space:pre-wrap; word-break:break-word; max-height:40vh; overflow-y:auto; font-family: ui-monospace, Menlo, monospace; margin-top:10px;">${escapeHtml(m.rawText || '(no text detected)')}</pre>` : ''}
        `;
      },

      // Pull current DOM values back into modal state so a re-render (month change,
      // toggle, raw toggle) preserves the user's in-progress edits.
      syncReviewFromDom_() {
        const m = this.state.modal;
        if (!m || m.kind !== 'photoReview') return;
        const g = id => document.getElementById(id);
        m.candidates.forEach(c => {
          if (g('rv_title_' + c.idx)) c.title = g('rv_title_' + c.idx).value;
          if (g('rv_date_' + c.idx)) c.date = g('rv_date_' + c.idx).value;
          if (g('rv_start_' + c.idx)) c.start_time = g('rv_start_' + c.idx).value;
          if (g('rv_end_' + c.idx)) c.end_time = g('rv_end_' + c.idx).value;
          if (g('rv_kid_' + c.idx)) c.kid = g('rv_kid_' + c.idx).value;
        });
        if (g('rv_month')) m.month = parseInt(g('rv_month').value, 10);
        if (g('rv_year')) m.year = parseInt(g('rv_year').value, 10);
      },

      toggleReviewRow(idx) {
        this.syncReviewFromDom_();
        const c = this.state.modal.candidates.find(x => x.idx === idx);
        if (c) c.accept = !c.accept;
        this.render();
      },

      setReviewMonthYear() {
        this.syncReviewFromDom_();
        const m = this.state.modal;
        if (m.year && m.month) {
          m.candidates.forEach(c => { if (c.day) c.date = ymdToIso(m.year, m.month, c.day); });
        }
        this.render();
      },

      toggleReviewRaw() {
        this.syncReviewFromDom_();
        this.state.modal.showRaw = !this.state.modal.showRaw;
        this.render();
      },

      async confirmReconcile() {
        this.syncReviewFromDom_();
        const m = this.state.modal;
        const accepted = m.candidates.filter(c => c.accept);
        if (!accepted.length) { alert('Tick at least one event to add.'); return; }
        const noTitle = accepted.find(c => !c.title.trim());
        if (noTitle) { alert('Every ticked event needs a title.'); return; }
        const noDate = accepted.find(c => !c.date);
        if (noDate) { alert('“' + (noDate.title || 'An event') + '” needs a date.'); return; }
        // Batch all missing-time rows into one message so the user fixes/unticks
        // them in a single pass instead of hitting Add repeatedly.
        const noTimes = accepted.filter(c => !c.start_time);
        if (noTimes.length) {
          const names = noTimes.map(c => '• ' + (c.title.trim() || 'untitled')).join('\n');
          alert(noTimes.length + ' ticked event' + (noTimes.length === 1 ? '' : 's') + ' still need a start time. Set a time or untick:\n\n' + names);
          return;
        }
        const payload = accepted.map(c => ({
          date: c.date,
          title: c.title.trim(),
          start_time: c.start_time,
          end_time: c.end_time || '',
          kid: c.kid || 'shared',
          location: c.location || '',
          source: 'ocr'
        }));
        const photoId = m.photo.id;
        this.openModal({ kind: 'info', title: 'Adding…', body: 'Saving events and syncing to the calendar.' });
        try {
          const res = await apiCallRaw('reconcile_photo', { id: photoId, accepted: payload });
          const warns = (res.calendar_warnings && res.calendar_warnings.length)
            ? ' (' + res.calendar_warnings.length + ' calendar sync warning' + (res.calendar_warnings.length === 1 ? '' : 's') + ')'
            : '';
          this.openModal({ kind: 'info', title: 'Added', body: res.data.created + ' event' + (res.data.created === 1 ? '' : 's') + ' added to your plan.' + warns });
          this.loadView();
        } catch (e) {
          this.closeModal();
          alert('Could not add events: ' + e.message);
        }
      },

      // ============================================================
      // Render
      // ============================================================
      render() {
        const root = document.getElementById('root');
        const nav = document.getElementById('bottomNav');

        // Token onboarding gate - no app chrome, no nav.
        if (this.state.needsToken) {
          nav.innerHTML = '';
          root.innerHTML = this.viewTokenGate();
          window.scrollTo(0, 0);
          const input = document.getElementById('tokenInput');
          if (input) input.focus();
          return;
        }

        let view;
        if (this.state.loading) {
          view = this.viewLoading();
        } else if (this.state.error) {
          view = this.viewError();
        } else {
          switch (this.state.currentView) {
            case 'today':    view = this.viewToday(); break;
            case 'week':     view = this.viewWeek(); break;
            case 'library':  view = this.viewLibrary(); break;
            case 'photos':   view = this.viewPhotos(); break;
            case 'settings': view = this.viewSettings(); break;
            default:         view = this.viewToday();
          }
        }

        const showCamera = this.state.currentView === 'today' && !this.state.loading && !this.state.error;
        root.innerHTML = `
          <header class="app-header">
            <div class="brand"><span class="dot"></span>KidPlan</div>
            <div class="header-actions">
              ${showCamera ? `<button class="icon-btn" onclick="app.openPhotoCapture()" aria-label="Capture paper calendar">${ICONS.camIcon}</button>` : ''}
            </div>
          </header>
          ${view}
          ${this.renderModal()}
        `;

        this.renderNav();
        window.scrollTo(0, 0);
      },

      viewTokenGate() {
        return `
          <main class="view" style="max-width:380px; margin:0 auto; padding-top:14vh;">
            <div class="brand" style="font-family:var(--font-display); font-weight:600; font-size:30px; margin-bottom:6px;">
              <span class="dot" style="display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--accent);margin-right:9px;"></span>KidPlan
            </div>
            <div class="view-sub" style="margin-bottom:22px;">Enter your access token to connect.</div>
            <div class="plan-section">
              <input id="tokenInput" type="password" autocomplete="off" autocapitalize="off" spellcheck="false"
                placeholder="Access token"
                style="width:100%; padding:14px; border:1px solid var(--ink-faint); border-radius:var(--radius); font-size:15px; background:var(--surface); margin-bottom:12px;"
                onkeydown="if(event.key==='Enter') app.saveTokenFromInput()">
              ${this.state.tokenError ? `<div style="color:var(--warn); font-size:13px; margin-bottom:12px;">${escapeHtml(this.state.tokenError)}</div>` : ''}
              <button class="btn-primary" onclick="app.saveTokenFromInput()">Save and connect</button>
            </div>
          </main>
        `;
      },

      viewLoading() {
        return `<main class="view"><div class="empty-state">Loading…</div></main>`;
      },

      viewError() {
        return `
          <main class="view">
            <div class="empty-state">
              <div style="margin-bottom:14px;">Could not reach KidPlan.<br><span style="font-size:13px;">${escapeHtml(this.state.error)}</span></div>
              <button class="btn-secondary" style="max-width:200px;margin:0 auto;" onclick="app.retry()">Try again</button>
            </div>
          </main>
        `;
      },

      renderNav() {
        const nav = document.getElementById('bottomNav');
        const cur = this.state.currentView;
        const tabs = [
          { id: 'today', label: 'Today', icon: 'calendar' },
          { id: 'week', label: 'Week', icon: 'week' },
          { id: 'library', label: 'Library', icon: 'bookmark' },
          { id: 'settings', label: 'Settings', icon: 'gear' }
        ];
        nav.innerHTML = `
          <div class="nav-inner">
            ${tabs.map(t => `
              <button class="nav-btn ${cur === t.id ? 'active' : ''}" onclick="app.navigate('${t.id}')" aria-label="${t.label}">
                ${ICONS[t.icon](cur === t.id)}
                <span>${t.label}</span>
              </button>
            `).join('')}
          </div>
        `;
      },

      renderModal() {
        const m = this.state.modal;
        if (!m) return '';
        let inner;
        switch (m.kind) {
          case 'picker':    inner = this.renderLibraryPicker(m); break;
          case 'when':      inner = this.renderWhenSheet(m); break;
          case 'planItem':  inner = this.renderPlanItemEditor(m); break;
          case 'duplicate': inner = this.renderDuplicateEditor(m); break;
          case 'library':   inner = this.renderLibraryEditor(m); break;
          case 'tag':       inner = this.renderTagEditor(m); break;
          case 'photoReview': inner = this.renderPhotoReview(m); break;
          default:          inner = this.renderInfoModal(m); break;
        }
        return `
          <div class="modal-backdrop" onclick="if(event.target===this) app.closeModal()">
            <div class="modal" style="max-height:90vh; overflow-y:auto;">
              ${inner}
            </div>
          </div>
        `;
      },

      renderInfoModal(m) {
        return `
          <h3>${escapeHtml(m.title)}</h3>
          <p>${escapeHtml(m.body)}</p>
          <button class="modal-close" onclick="app.closeModal()">Got it</button>
        `;
      },

      // Reusable bits for editor modals.
      tagOptions(selected) {
        return this.data.tags.map(t =>
          `<option value="${escapeHtml(t.tag)}" ${t.tag === selected ? 'selected' : ''}>${escapeHtml(tagLabel(t.tag))}</option>`
        ).join('');
      },

      modalHeader(title) {
        return `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
            <h3 style="margin:0;">${escapeHtml(title)}</h3>
            <button class="icon-btn" onclick="app.closeModal()" aria-label="Close">${ICONS.x}</button>
          </div>
        `;
      },

      // ---------- Plan item editor ----------
      openPlanItem(id) {
        const item = (this.data.items || []).find(it => it.id === id);
        if (!item) return;
        this.openModal({ kind: 'planItem', item });
      },

      renderPlanItemEditor(m) {
        const it = m.item;
        const fld = 'margin-bottom:14px;';
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        const lanes = [['shared','Shared'],['elder','Elder'],['younger','Younger']];
        const isBackup = asBool(it.is_backup);
        return `
          ${this.modalHeader(isBackup ? 'Edit backup' : 'Edit activity')}
          <div style="${fld}">
            <label style="${lbl}">Lane</label>
            <select id="pi_kid" style="${inp}">
              ${lanes.map(([v,l]) => `<option value="${v}" ${it.kid === v ? 'selected' : ''}>${l}</option>`).join('')}
            </select>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Title</label>
            <input id="pi_title" style="${inp}" value="${escapeHtml(it.title || '')}" placeholder="What's happening">
          </div>
          <div style="display:flex; gap:10px; ${fld}">
            <div style="flex:1;"><label style="${lbl}">Start</label><input id="pi_start" type="time" style="${inp}" value="${escapeHtml(it.start_time || '')}" required></div>
            <div style="flex:1;"><label style="${lbl}">End</label><input id="pi_end" type="time" style="${inp}" value="${escapeHtml(it.end_time || '')}" placeholder="optional"></div>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Description</label>
            <textarea id="pi_desc" rows="2" style="${inp}" placeholder="Optional">${escapeHtml(it.description || '')}</textarea>
          </div>
          <div style="${fld}">
            <label style="${lbl}">Location</label>
            <input id="pi_loc" style="${inp}" value="${escapeHtml(it.location || '')}" placeholder="Optional">
          </div>
          <div style="${fld}">
            <label style="${lbl}">Tag</label>
            <select id="pi_tag" style="${inp}"><option value="">(none)</option>${this.tagOptions(it.tag)}</select>
          </div>
          <button class="btn-primary" onclick="app.savePlanItem()">Save</button>
          <button class="btn-secondary" style="margin-top:10px; color:var(--warn);" onclick="app.deletePlanItem('${escapeHtml(it.id)}')">Delete${isBackup ? ' backup' : ''}</button>
        `;
      },

      async savePlanItem() {
        const it = this.state.modal.item;
        const title = document.getElementById('pi_title').value.trim();
        const start_time = document.getElementById('pi_start').value;
        if (!title) { alert('Title is required'); return; }
        if (!start_time) { alert('Start time is required'); return; }
        const params = {
          id: it.id,
          date: it.date,
          kid: document.getElementById('pi_kid').value,
          title,
          description: document.getElementById('pi_desc').value,
          start_time,
          end_time: document.getElementById('pi_end').value,
          location: document.getElementById('pi_loc').value,
          tag: document.getElementById('pi_tag').value,
          is_backup: asBool(it.is_backup),
          backup_for_id: it.backup_for_id || ''
        };
        try {
          const res = await apiCallRaw('upsert_plan_item', params);
          this.state.calendarNotice = res.calendar_warning || '';
          this.closeModal();
          this.loadView();
        } catch (e) {
          alert('Could not save: ' + e.message);
        }
      },

      dismissCalendarNotice() {
        this.state.calendarNotice = '';
        this.render();
      },

      async deletePlanItem(id) {
        // Optimistic: drop locally and re-render, then confirm with server.
        const prev = this.data.items;
        this.data.items = prev.filter(it => it.id !== id);
        this.closeModal();
        this.render();
        try {
          await apiCall('delete_plan_item', { id });
          this.loadView();
        } catch (e) {
          this.data.items = prev;
          this.render();
          alert('Could not delete: ' + e.message);
        }
      },

      // ---------- Library picker (primary OR backup add) ----------
      // mode='primary' (default): tapping a library item collects a start time and
      // creates a primary PlanItem. mode='backup': tapping creates a backup paired
      // to the given primaryId, with start time pre-filled from the primary.
      openPicker() {
        this.state.pickerFilter = 'all';
        this.state.pickerSearch = '';
        if (!this.data.library || !this.data.library.length) {
          apiCall('list_library', {}).then(lib => {
            this.data.library = lib || [];
            if (this.state.modal && this.state.modal.kind === 'picker') this.render();
          }).catch(() => {});
        }
        this.openModal({ kind: 'picker', mode: 'primary' });
      },

      openBackupPicker(primaryId) {
        const primary = (this.data.items || []).find(it => it.id === primaryId);
        if (!primary) return;
        // Optimistic temp rows haven't been saved yet; their id can't be a valid
        // backup_for_id. Tell the user to wait rather than letting the server reject.
        if (String(primary.id).startsWith('temp_')) {
          alert('Still saving the activity. Try again in a moment.');
          return;
        }
        this.state.pickerFilter = 'all';
        this.state.pickerSearch = '';
        this.openModal({ kind: 'picker', mode: 'backup', primary });
      },

      setPickerFilter(tag) {
        this.state.pickerFilter = tag;
        this.render();
      },

      // Re-render the list in place as the user types (input keeps focus via state).
      onPickerSearch(val) {
        this.state.pickerSearch = val;
        const list = document.getElementById('pickerList');
        if (list) list.innerHTML = this.pickerRowsHtml();
      },

      pickerRowsHtml() {
        const filter = this.state.pickerFilter;
        const q = (this.state.pickerSearch || '').trim().toLowerCase();
        let rows = (this.data.library || []);
        if (filter !== 'all') rows = rows.filter(l => l.tag === filter);
        if (q) rows = rows.filter(l => (l.name || '').toLowerCase().includes(q) || (l.description || '').toLowerCase().includes(q));
        if (!rows.length) return `<div class="empty-state" style="margin-top:0;">No activities match. Try "+ New activity" above.</div>`;
        const ageLabel = (a) => a === 'both' || a === 'any' ? 'all ages' : a;
        return rows.map(l => {
          const dur = parseInt(l.typical_duration_min, 10);
          return `
            <div class="picker-row">
              <div class="name ${tagClass(l.tag)}"><span class="swatch"></span>${escapeHtml(l.name)}</div>
              <div class="meta">
                ${asBool(l.indoor) ? ICONS.indoor : ICONS.outdoor}
                ${!isNaN(dur) ? `<span>${dur} min</span>` : ''}
                <span class="age-pill">${escapeHtml(ageLabel(l.kid_age_fit))}</span>
              </div>
              <div class="picker-actions">
                <button class="picker-add" onclick="app.pickFromLibrary('${escapeHtml(l.id)}')">${ICONS.plusSm} Pick</button>
              </div>
            </div>
          `;
        }).join('');
      },

      renderLibraryPicker(m) {
        const sortedTags = [...this.data.tags].sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
        const filters = ['all'].concat(sortedTags.map(t => t.tag));
        const headerTitle = m && m.mode === 'backup'
          ? `Backup for: ${escapeHtml(m.primary.title)} (${escapeHtml(formatTime(m.primary.start_time))})`
          : 'Add activity';
        return `
          ${this.modalHeader(headerTitle)}
          <button class="picker-newbtn" onclick="app.openLibraryEditor('', true)">${ICONS.plusSm} New activity</button>
          <input class="picker-search" placeholder="Search activities" value="${escapeHtml(this.state.pickerSearch || '')}" oninput="app.onPickerSearch(this.value)">
          <div class="filter-bar">
            ${filters.map(f => `
              <button class="filter-chip ${this.state.pickerFilter === f ? 'active' : ''} ${f !== 'all' ? tagClass(f) : ''}" onclick="app.setPickerFilter('${escapeHtml(f)}')">
                ${f !== 'all' ? '<span class="swatch"></span>' : ''}
                ${escapeHtml(f === 'all' ? 'All' : tagLabel(f))}
              </button>
            `).join('')}
          </div>
          <div class="picker-list" id="pickerList">${this.pickerRowsHtml()}</div>
        `;
      },

      // Picker tap: swap the modal for the "When?" sheet which collects the
      // (required) start time + (default Shared) lane before writing the item.
      pickFromLibrary(libId) {
        const lib = (this.data.library || []).find(l => l.id === libId);
        if (!lib) return;
        const m = this.state.modal || {};
        const mode = m.mode || 'primary';
        const primary = mode === 'backup' ? m.primary : null;
        const defaultStart = primary
          ? primary.start_time
          : suggestNextHour_();
        this.openModal({
          kind: 'when',
          mode,
          lib,
          primaryId: primary ? primary.id : '',
          startTime: defaultStart,
          kid: primary ? (primary.kid || 'shared') : 'shared'
        });
      },

      renderWhenSheet(m) {
        const fld = 'margin-bottom:14px;';
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        const lanes = [['shared','Shared'],['elder','Elder'],['younger','Younger']];
        const title = m.mode === 'backup' ? 'When? (backup)' : 'When?';
        return `
          ${this.modalHeader(title)}
          <div style="margin-bottom:16px;">
            <div class="${tagClass(m.lib.tag)}" style="font-weight:600; font-size:17px; display:flex; align-items:center; gap:8px;">
              <span class="swatch" style="width:10px; height:10px; border-radius:50%; background:var(--chip-color, var(--ink-soft));"></span>
              ${escapeHtml(m.lib.name)}
            </div>
            ${m.lib.tag ? `<div style="font-size:13px; color:var(--ink-soft); margin-top:4px;">${escapeHtml(tagLabel(m.lib.tag))}</div>` : ''}
          </div>
          <div style="${fld}">
            <label style="${lbl}">Start time *</label>
            <input id="when_start" type="time" style="${inp}" value="${escapeHtml(m.startTime || '')}" required>
          </div>
          <div style="${fld}">
            <label style="${lbl}">For</label>
            <div style="display:flex; gap:8px;">
              ${lanes.map(([v,l]) => `
                <button type="button" id="when_kid_${v}" class="tag-chip ${m.kid === v ? 'primary' : 'outlined'}"
                  style="flex:1; justify-content:center; cursor:pointer;"
                  data-kid="${v}"
                  onclick="app.setWhenKid('${v}')">${escapeHtml(l)}</button>
              `).join('')}
            </div>
          </div>
          <button class="btn-primary" onclick="app.confirmAddFromWhen()">${m.mode === 'backup' ? 'Add backup' : 'Add to day'}</button>
          <div style="font-size:12px; color:var(--ink-soft); margin-top:14px; line-height:1.45;">
            End time, description, location, ${m.mode === 'backup' ? '' : 'and a backup, '}all editable from the activity row afterward.
          </div>
        `;
      },

      setWhenKid(kid) {
        const m = this.state.modal;
        if (!m || m.kind !== 'when') return;
        m.kid = kid;
        ['shared','elder','younger'].forEach(v => {
          const btn = document.getElementById('when_kid_' + v);
          if (btn) btn.className = 'tag-chip ' + (v === kid ? 'primary' : 'outlined');
        });
      },

      // Save from the When sheet. Optimistic insert into this.data.items so the
      // activity (or backup) appears immediately; reconcile from server response.
      async confirmAddFromWhen() {
        const m = this.state.modal;
        if (!m || m.kind !== 'when') return;
        const startInput = document.getElementById('when_start');
        const start_time = startInput ? startInput.value : '';
        if (!start_time) { alert('Start time is required'); return; }
        const lib = m.lib;
        const date = this.state.currentDate;
        const dur = parseInt(lib.typical_duration_min, 10);
        const end_time = !isNaN(dur) && dur > 0
          ? addMinutesToTime(start_time, dur)
          : addMinutesToTime(start_time, 60);
        const params = {
          date,
          kid: m.kid || 'shared',
          title: lib.name,
          description: lib.description || '',
          start_time,
          end_time,
          location: '',
          tag: lib.tag || '',
          source: 'library',
          is_backup: m.mode === 'backup',
          backup_for_id: m.mode === 'backup' ? (m.primaryId || '') : ''
        };
        const tempId = 'temp_' + Date.now();
        this.data.items = (this.data.items || []).concat([Object.assign({ id: tempId }, params)]);
        this.closeModal();
        this.render();
        try {
          const res = await apiCallRaw('upsert_plan_item', params);
          this.state.calendarNotice = res.calendar_warning || '';
          this.data.items = this.data.items.map(it => it.id === tempId ? res.data : it);
          this.render();
        } catch (e) {
          this.data.items = this.data.items.filter(it => it.id !== tempId);
          this.render();
          alert('Could not add: ' + e.message);
        }
      },

      // ---------- Inline activity controls (lane + times, edit in place) ----------
      // Persist a single field change on a day activity via upsert_plan_item.
      // Start_time is required server-side, so we refuse to clear it inline.
      async updatePlanItemField(id, field, value) {
        const it = (this.data.items || []).find(x => x.id === id);
        if (!it || String(it[field] || '') === String(value || '')) return;
        if (field === 'start_time' && !value) { alert('Start time is required.'); this.render(); return; }
        const prev = it[field];
        it[field] = value; // optimistic local update
        const params = {
          id: it.id, date: it.date, kid: it.kid, title: it.title,
          description: it.description || '',
          start_time: it.start_time || '', end_time: it.end_time || '',
          location: it.location || '', tag: it.tag || '',
          is_backup: asBool(it.is_backup),
          backup_for_id: it.backup_for_id || '',
          source: it.source || 'manual'
        };
        try {
          const res = await apiCallRaw('upsert_plan_item', params);
          this.state.calendarNotice = res.calendar_warning || '';
          Object.assign(it, res.data);
          // A primary time edit drags the backup along server-side; refresh so
          // the paired backup row picks up the new time too.
          if ((field === 'start_time' || field === 'end_time') && !asBool(it.is_backup)) {
            this.loadView();
            return;
          }
          if (this.state.calendarNotice) this.render();
        } catch (e) {
          it[field] = prev;
          this.render();
          alert('Could not update: ' + e.message);
        }
      },

      // ---------- Duplicate this day's activities to a range ----------
      openDuplicate() {
        this.openModal({ kind: 'duplicate' });
      },

      renderDuplicateEditor() {
        const start = this.state.currentDate;
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        return `
          ${this.modalHeader('Copy this day to a range')}
          <p style="margin-bottom:14px;">Copies every activity (and its paired backup) on ${escapeHtml(formatLongDate(parseISO(start)))} onto each date in the range.</p>
          <div style="display:flex; gap:10px; margin-bottom:14px;">
            <div style="flex:1;"><label style="${lbl}">From</label><input id="dup_start" type="date" style="${inp}" value="${escapeHtml(start)}"></div>
            <div style="flex:1;"><label style="${lbl}">To</label><input id="dup_end" type="date" style="${inp}" value="${escapeHtml(start)}"></div>
          </div>
          <button class="btn-primary" onclick="app.runDuplicate()">Copy</button>
        `;
      },

      async runDuplicate() {
        const params = {
          source_date: this.state.currentDate,
          range_start: document.getElementById('dup_start').value,
          range_end: document.getElementById('dup_end').value
        };
        try {
          const res = await apiCall('duplicate_plan_items_to_range', params);
          this.openModal({ kind: 'info', title: 'Copied', body: `${res.plan_items_created} item(s) created across ${res.dates_created} date(s).` });
        } catch (e) {
          alert('Could not copy: ' + e.message);
        }
      },

      // ---------- Library editor ----------
      openLibraryEditor(id, andAddToDay) {
        let item = id ? (this.data.library || []).find(l => l.id === id) : null;
        if (!item) item = { id: '', name: '', tag: this.data.tags[0] ? this.data.tags[0].tag : '', description: '', indoor: true, typical_duration_min: '', kid_age_fit: 'both', notes: '' };
        // andAddToDay: came from the picker - save to Library AND add to the current day.
        this.openModal({ kind: 'library', item, andAddToDay: !!andAddToDay });
      },

      renderLibraryEditor(m) {
        const it = m.item;
        const fld = 'margin-bottom:14px;';
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        const addToDay = this.state.modal && this.state.modal.andAddToDay;
        return `
          ${this.modalHeader(addToDay ? 'New library activity' : (it.id ? 'Edit activity' : 'Add activity'))}
          ${addToDay ? `<p style="margin-bottom:14px;">Saves to your Library, then jumps to the When? sheet so you can put it on today's plan.</p>` : ''}
          <div style="${fld}"><label style="${lbl}">Name</label><input id="lib_name" style="${inp}" value="${escapeHtml(it.name || '')}"></div>
          <div style="${fld}"><label style="${lbl}">Tag</label><select id="lib_tag" style="${inp}">${this.tagOptions(it.tag)}</select></div>
          <div style="${fld}"><label style="${lbl}">Description</label><textarea id="lib_desc" rows="2" style="${inp}">${escapeHtml(it.description || '')}</textarea></div>
          <div style="display:flex; gap:10px; ${fld}">
            <div style="flex:1;"><label style="${lbl}">Duration (min)</label><input id="lib_dur" type="number" style="${inp}" value="${escapeHtml(it.typical_duration_min || '')}"></div>
            <div style="flex:1;"><label style="${lbl}">Age fit</label><select id="lib_age" style="${inp}">${['any','young','older','both'].map(a => `<option value="${a}" ${it.kid_age_fit === a ? 'selected' : ''}>${tagLabel(a)}</option>`).join('')}</select></div>
          </div>
          <label style="display:flex; align-items:center; gap:10px; ${fld} font-size:14px;">
            <input type="checkbox" id="lib_indoor" ${asBool(it.indoor) ? 'checked' : ''} style="width:18px;height:18px;"> Indoor
          </label>
          <div style="${fld}"><label style="${lbl}">Notes</label><textarea id="lib_notes" rows="2" style="${inp}">${escapeHtml(it.notes || '')}</textarea></div>
          <button class="btn-primary" onclick="app.saveLibrary()">${addToDay ? 'Save and add to day' : 'Save'}</button>
          ${it.id ? `<button class="btn-secondary" style="margin-top:10px; color:var(--warn);" onclick="app.deleteLibrary('${escapeHtml(it.id)}')">Delete</button>` : ''}
        `;
      },

      async saveLibrary() {
        const it = this.state.modal.item;
        const name = document.getElementById('lib_name').value.trim();
        if (!name) { alert('Name is required'); return; }
        const params = {
          name,
          tag: document.getElementById('lib_tag').value,
          description: document.getElementById('lib_desc').value,
          typical_duration_min: document.getElementById('lib_dur').value,
          kid_age_fit: document.getElementById('lib_age').value,
          indoor: document.getElementById('lib_indoor').checked ? 'TRUE' : 'FALSE',
          notes: document.getElementById('lib_notes').value
        };
        if (it.id) params.id = it.id;
        const addToDay = this.state.modal && this.state.modal.andAddToDay;
        try {
          const savedLib = await apiCall('upsert_library', params);
          // Keep the library cache fresh for the picker.
          this.data.library = (this.data.library || []).filter(l => l.id !== savedLib.id).concat([savedLib]);
          if (addToDay) {
            // Hop straight into the When? sheet for the just-saved item.
            this.openModal({
              kind: 'when',
              mode: 'primary',
              lib: savedLib,
              primaryId: '',
              startTime: suggestNextHour_(),
              kid: 'shared'
            });
          } else {
            this.closeModal();
            this.loadView();
          }
        } catch (e) {
          alert('Could not save: ' + e.message);
        }
      },

      async deleteLibrary(id) {
        try {
          await apiCall('delete_library', { id });
          this.closeModal();
          this.loadView();
        } catch (e) {
          alert('Could not delete: ' + e.message);
        }
      },

      // ---------- Tag editor ----------
      openTagEditor(tag) {
        let item = tag ? (this.data.tags || []).find(t => t.tag === tag) : null;
        if (!item) item = { tag: '', color: '#B8A6D9', display_order: (this.data.tags.length + 1) };
        this.openModal({ kind: 'tag', item });
      },

      renderTagEditor(m) {
        const it = m.item;
        const fld = 'margin-bottom:14px;';
        const lbl = 'display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;';
        const inp = 'width:100%; padding:11px 12px; border:1px solid var(--ink-faint); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); font-family:inherit;';
        return `
          ${this.modalHeader(it.tag ? 'Edit tag' : 'Add tag')}
          <div style="${fld}"><label style="${lbl}">Tag (lowercase)</label><input id="tag_name" style="${inp}" value="${escapeHtml(it.tag || '')}" ${it.tag ? 'readonly' : ''} placeholder="e.g. beach-day"></div>
          <div style="${fld}"><label style="${lbl}">Color</label><input id="tag_color" type="color" style="width:60px; height:40px; border:none; background:none;" value="${escapeHtml(it.color || '#B8A6D9')}"></div>
          <div style="${fld}"><label style="${lbl}">Display order</label><input id="tag_order" type="number" style="${inp}" value="${escapeHtml(it.display_order || '')}"></div>
          <button class="btn-primary" onclick="app.saveTag()">Save tag</button>
        `;
      },

      async saveTag() {
        const tag = document.getElementById('tag_name').value.trim().toLowerCase();
        if (!tag) { alert('Tag is required'); return; }
        const params = {
          tag,
          color: document.getElementById('tag_color').value,
          display_order: document.getElementById('tag_order').value
        };
        try {
          await apiCall('upsert_tag', params);
          this.data.tags = [];
          this.closeModal();
          this.loadView();
        } catch (e) {
          alert('Could not save: ' + e.message);
        }
      },

      // ============================================================
      // TODAY
      // ============================================================
      // Gentle inline notice: the activity saved but calendar sync failed.
      calendarNoticeHtml() {
        if (!this.state.calendarNotice) return '';
        return `
          <div class="inline-notice">
            ${ICONS.rain}
            <span>Saved - but couldn't sync to calendar: ${escapeHtml(this.state.calendarNotice)}</span>
            <button class="icon-btn" style="width:24px;height:24px;background:none;box-shadow:none;margin-left:auto;color:inherit;" onclick="app.dismissCalendarNotice()" aria-label="Dismiss">${ICONS.x}</button>
          </div>
        `;
      },

      viewToday() {
        const date = this.state.currentDate;
        const items = this.data.items || [];
        const externals = this.data.externals || [];
        const d = parseISO(date);
        const lanes = [['shared','Shared'],['elder','Elder'],['younger','Younger']];

        const heroAndNav = `
          <div class="today-hero">
            <div class="today-date-row"><div class="today-date">${escapeHtml(formatLongDate(d))}</div></div>
            <div class="day-nav">
              <button onclick="app.shiftDay(-1)" aria-label="Previous day">${ICONS.chevL}</button>
              <button onclick="app.shiftDay(1)" aria-label="Next day">${ICONS.chevR}</button>
              <button class="today-link" onclick="app.goToToday()">Jump to today</button>
            </div>
          </div>
        `;

        // Empty state when nothing is planned and there are no externals to surface.
        if (!items.length && !externals.length) {
          return `
            <main class="view">
              ${this.calendarNoticeHtml()}
              ${heroAndNav}
              <div class="empty-state" style="text-align:left;">
                <div style="font-family:var(--font-display); font-weight:600; font-size:17px; color:var(--ink); margin-bottom:4px;">Nothing planned yet</div>
                <div style="margin-bottom:16px;">Tap below to pick something from your Library.</div>
                <button class="btn-primary" onclick="app.openPicker()">${ICONS.plusSm} Add activity</button>
                <div class="sync-hint">
                  ${ICONS.calendar(false)}
                  <span>Activities and backups sync to the family Google Calendar.</span>
                </div>
              </div>
            </main>
          `;
        }

        // Pair primaries with their backups for nested rendering.
        const primaries = items.filter(it => !asBool(it.is_backup));
        const backupsBy = {};
        items.filter(it => asBool(it.is_backup)).forEach(b => {
          if (b.backup_for_id) backupsBy[b.backup_for_id] = b;
        });
        primaries.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));

        // Merge primaries + externals into one chronological timeline.
        const timeline = [];
        primaries.forEach(p => timeline.push({ kind: 'primary', sort: p.start_time || '', item: p }));
        externals.forEach(e => {
          const sortKey = e.all_day ? '00:00' : (String(e.start).slice(11, 16) || '00:00');
          timeline.push({ kind: 'external', sort: sortKey, item: e });
        });
        timeline.sort((a, b) => a.sort.localeCompare(b.sort));

        const laneOptions = (selectedKid, id) =>
          lanes.map(([v,l]) => `<option value="${v}" ${selectedKid === v ? 'selected' : ''}>${l}</option>`).join('');

        const renderPrimary = (it) => {
          const backup = backupsBy[it.id];
          return `
            <div class="activity-item ${tagClass(it.tag)}">
              <div class="activity-top">
                <span class="swatch"></span>
                <span class="title" onclick="app.openPlanItem('${escapeHtml(it.id)}')">${escapeHtml(it.title)}</span>
                <button class="activity-del" onclick="app.deletePlanItem('${escapeHtml(it.id)}')" aria-label="Remove">${ICONS.x}</button>
              </div>
              <div class="activity-controls">
                <select class="inline-select" onchange="app.updatePlanItemField('${escapeHtml(it.id)}','kid',this.value)">
                  ${laneOptions(it.kid)}
                </select>
                <input class="inline-time" type="time" value="${escapeHtml(it.start_time || '')}" onchange="app.updatePlanItemField('${escapeHtml(it.id)}','start_time',this.value)">
                <span class="inline-time-sep">to</span>
                <input class="inline-time" type="time" value="${escapeHtml(it.end_time || '')}" onchange="app.updatePlanItemField('${escapeHtml(it.id)}','end_time',this.value)">
              </div>
              ${backup
                ? `
                  <div class="backup-row ${tagClass(backup.tag)}">
                    <span class="backup-label">${ICONS.bookmarkSm} Backup</span>
                    <span class="backup-title" onclick="app.openPlanItem('${escapeHtml(backup.id)}')">${escapeHtml(backup.title)}</span>
                    <button class="activity-del" onclick="app.deletePlanItem('${escapeHtml(backup.id)}')" aria-label="Remove backup">${ICONS.x}</button>
                  </div>
                `
                : (String(it.id).startsWith('temp_')
                    ? `<span class="add-backup-btn" style="opacity:0.5;">Saving…</span>`
                    : `<button class="add-backup-btn" onclick="app.openBackupPicker('${escapeHtml(it.id)}')">${ICONS.plusSm} Add backup</button>`)
              }
            </div>
          `;
        };

        const renderExternal = (ev) => {
          const timeLabel = ev.all_day ? 'all day' : formatTime(String(ev.start).slice(11, 16));
          return `
            <div class="external-event">
              <span class="external-time">${escapeHtml(timeLabel)}</span>
              <span class="external-title">${escapeHtml(ev.title || '(untitled)')}</span>
              <span class="external-cal">from ${escapeHtml(ev.calendar_name)}</span>
            </div>
          `;
        };

        return `
          <main class="view">
            ${this.calendarNoticeHtml()}
            ${heroAndNav}

            <section class="plan-section">
              <h3>Today <span class="label-pill">calendar</span></h3>
              ${timeline.map(t => t.kind === 'primary' ? renderPrimary(t.item) : renderExternal(t.item)).join('')}
              <button class="link-btn" onclick="app.openPicker()">+ Add activity</button>
            </section>

            <div class="sync-hint">
              ${ICONS.calendar(false)}
              <span>Activities and backups sync to the family Google Calendar. External events are read-only.</span>
            </div>

            <button class="btn-secondary" style="margin-top:14px;" onclick="app.openDuplicate()">${ICONS.calendar(false)} Copy this day to a date range</button>
          </main>
        `;
      },

      // ============================================================
      // WEEK
      // ============================================================
      viewWeek() {
        const start = parseISO(this.state.weekStart);
        const dates = Array.from({length: 7}, (_, i) => isoDate(addDays(start, i)));
        const todayIso = isoDate(new Date());
        const itemsByDate = {};
        (this.data.weekItems || []).forEach(it => {
          if (!itemsByDate[it.date]) itemsByDate[it.date] = [];
          itemsByDate[it.date].push(it);
        });
        const externalsByDate = {};
        (this.data.externals || []).forEach(ev => {
          const d = ev.all_day ? ev.start : String(ev.start).slice(0, 10);
          if (!externalsByDate[d]) externalsByDate[d] = [];
          externalsByDate[d].push(ev);
        });

        return `
          <main class="view">
            <div class="week-header">
              <button class="week-nav-btn" onclick="app.shiftWeek(-1)" aria-label="Previous week">${ICONS.chevL}</button>
              <div class="week-title">${escapeHtml(formatWeekHeader(start))}</div>
              <button class="week-nav-btn" onclick="app.shiftWeek(1)" aria-label="Next week">${ICONS.chevR}</button>
            </div>
            <div class="week-sub"><a onclick="app.goToToday()" style="cursor:pointer;">Jump to today</a></div>

            <div class="week-list">
              ${dates.map(dateIso => {
                const d = parseISO(dateIso);
                const isToday = dateIso === todayIso;
                const dayItems = (itemsByDate[dateIso] || []);
                const primaries = dayItems
                  .filter(it => !asBool(it.is_backup))
                  .sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
                const backups = dayItems.filter(it => asBool(it.is_backup));
                const externals = externalsByDate[dateIso] || [];
                const summary = !primaries.length && !externals.length
                  ? '— no plans —'
                  : primaries.map(p => p.title).join(' · ') || `${externals.length} external event${externals.length === 1 ? '' : 's'}`;
                return `
                  <button class="day-row ${isToday ? 'today' : ''}" onclick="app.jumpToDay('${dateIso}')">
                    <div class="stripe"></div>
                    <div class="day-content">
                      <div class="date-block">
                        <div class="dow">${DOW[d.getDay()]}</div>
                        <div class="dom">${d.getDate()}</div>
                      </div>
                      <div class="summary">
                        <div class="primary-line">${escapeHtml(summary)}</div>
                        <div class="tag-line">${primaries.map(p => `<span class="week-chip ${tagClass(p.tag)}"><span class="swatch"></span>${escapeHtml(p.title)}</span>`).join('')}${externals.map(() => `<span class="week-tick"></span>`).join('')}</div>
                      </div>
                      <div class="icons">${backups.length ? `${ICONS.bookmarkSm}<span style="font-size:11px;">${backups.length}</span>` : ''}</div>
                    </div>
                  </button>
                `;
              }).join('')}
            </div>
          </main>
        `;
      },

      // ============================================================
      // LIBRARY
      // ============================================================
      viewLibrary() {
        const filter = this.state.libraryFilter;
        const all = this.data.library || [];
        const items = (filter === 'all' ? all : all.filter(i => i.tag === filter))
          .slice()
          .sort((a, b) => (a.name || '').localeCompare(b.name || ''));

        const sortedTags = [...this.data.tags].sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
        const filters = ['all'].concat(sortedTags.map(t => t.tag));
        const ageLabel = (a) => a === 'both' || a === 'any' ? 'all ages' : a;

        const renderCard = (it) => {
          const dur = parseInt(it.typical_duration_min, 10);
          return `
            <button class="library-card" style="width:100%;text-align:left;background:var(--surface);" onclick="app.openLibraryEditor('${escapeHtml(it.id)}')">
              <div class="top">
                <div class="name ${tagClass(it.tag)}">
                  <span class="swatch"></span>
                  ${escapeHtml(it.name)}
                </div>
                <div class="meta">
                  ${asBool(it.indoor) ? ICONS.indoor : ICONS.outdoor}
                  ${!isNaN(dur) ? `<span style="font-size:12px;color:var(--ink-soft);">${dur} min</span>` : ''}
                  <span class="age-pill">${escapeHtml(ageLabel(it.kid_age_fit))}</span>
                </div>
              </div>
              ${it.description ? `<div class="desc">${escapeHtml(it.description)}</div>` : ''}
            </button>
          `;
        };

        return `
          <main class="view">
            <h2 class="view-title">Library</h2>
            <div class="view-sub">Activities you can pull into a day.</div>

            <div class="filter-bar">
              ${filters.map(f => `
                <button class="filter-chip ${filter === f ? 'active' : ''} ${f !== 'all' ? tagClass(f) : ''}" onclick="app.setLibraryFilter('${escapeHtml(f)}')">
                  ${f !== 'all' ? '<span class="swatch"></span>' : ''}
                  ${escapeHtml(f === 'all' ? 'All' : tagLabel(f))}
                </button>
              `).join('')}
            </div>

            <div class="library-list">
              ${items.length
                ? items.map(renderCard).join('')
                : `<div class="empty-state">No activities match this filter.</div>`}
            </div>
          </main>

          <button class="fab" onclick="app.openLibraryEditor()" aria-label="Add activity">${ICONS.plus}</button>
        `;
      },

      // ============================================================
      // PHOTOS
      // ============================================================
      // Stub until Wave 4 wires camera capture + OCR reconciliation.
      viewPhotos() {
        return `
          <main class="view">
            <h2 class="view-title">Photos</h2>
            <div class="view-sub">Paper-calendar snapshots. Reconciliation surfaces what we extracted.</div>
            <div class="empty-state">
              <div style="margin-bottom:14px;">Photo capture and OCR reconciliation land in Wave 4.</div>
              <button class="btn-secondary" style="max-width:220px;margin:0 auto;" onclick="app.stubPhotoUpload()">${ICONS.camIcon} Take a photo</button>
            </div>
          </main>
        `;
      },

      // ============================================================
      // SETTINGS
      // ============================================================
      viewSettings() {
        const s = this.data.settings || {};
        const tags = [...this.data.tags].sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
        const family = s.family_calendar_id || '';
        const readOnly = (s.read_only_calendar_ids || '').split(',').map(x => x.trim()).filter(Boolean);
        const folder = s.photo_drive_folder_id || '';
        const mono = 'font-family: ui-monospace, Menlo, monospace; font-size: 12px; word-break:break-all;';

        return `
          <main class="view">
            <h2 class="view-title">Settings</h2>
            <div class="view-sub">Connected calendars and tags from the backend.</div>

            <div class="settings-section">
              <h3>Connected calendars</h3>
              <div class="settings-row">
                <span class="label">Write to (family)</span>
                <span class="value" style="${mono}">${escapeHtml(family || 'not set')}</span>
              </div>
              ${readOnly.length ? readOnly.map(c => `
                <div class="settings-row">
                  <span class="label">Read-only</span>
                  <span class="value" style="${mono}">${escapeHtml(c)}</span>
                </div>
              `).join('') : `<div class="settings-row"><span class="label">Read-only</span><span class="value">none</span></div>`}
            </div>

            <div class="settings-section">
              <h3>Photo upload</h3>
              <div class="settings-row">
                <span class="label">Drive folder</span>
                <span class="value" style="${mono}">${escapeHtml(folder || 'not set')}</span>
              </div>
            </div>

            <div class="settings-section">
              <h3>Tags</h3>
              ${tags.map(t => `
                <div class="tag-mgmt ${tagClass(t.tag)}" style="cursor:pointer;" onclick="app.openTagEditor('${escapeHtml(t.tag)}')">
                  <span class="swatch" style="background: ${escapeHtml(t.color || 'var(--chip-color)')};"></span>
                  <span class="name">${escapeHtml(tagLabel(t.tag))}</span>
                  <span class="order">order ${escapeHtml(t.display_order)}</span>
                </div>
              `).join('')}
              <button class="link-btn" onclick="app.openTagEditor()">+ Add tag</button>
            </div>

            <div class="settings-section">
              <h3>Access</h3>
              <div class="settings-row">
                <span class="label">Access token</span>
                <button class="link-btn" style="padding:0;" onclick="app.changeToken()">Change access token</button>
              </div>
            </div>

            <div class="settings-section">
              <h3>About</h3>
              <div class="settings-row">
                <span class="label">App</span>
                <span class="value">KidPlan</span>
              </div>
              <div class="settings-row">
                <span class="label">Build</span>
                <span class="value">Wave 3.5 - live</span>
              </div>
            </div>
          </main>
        `;
      }
    };

    // Boot - token gate then live load.
    document.addEventListener('DOMContentLoaded', () => app.boot());
    if (document.readyState !== 'loading') app.boot();

    // Register service worker placeholder (no SW file yet; safe no-op).
    // Wave 4 may add offline caching here.
  </script>
</body>
</html>
